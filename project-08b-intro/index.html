<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kapsul Masa — Selamat Datang</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#fff;cursor:none}
  body{font-family:"Century Gothic","Futura","Trebuchet MS","Segoe UI",sans-serif;color:#eaf6ff}

  /* 2D canvas — full screen */
  #cv{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1}

  /* narrator text */
  #narr{
    position:fixed;inset:0;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.3vmin;padding:6vmin;text-align:center;
    pointer-events:none;opacity:0;transition:opacity .9s ease}
  #narr.show{opacity:1}
  .nline{
    font-size:2.65vmin;font-weight:500;line-height:1.5;letter-spacing:.06em;
    color:#0a0e16;
    text-shadow:0 0 16px rgba(255,255,255,.7),0 0 4px rgba(255,255,255,.95);
    min-height:1.2em}
  .nline.first{font-size:3.7vmin;letter-spacing:.10em;font-weight:700;
    color:#000;text-shadow:0 0 18px rgba(255,255,255,.9),0 0 5px #fff;
    margin-bottom:.6vmin}
  .nline.accent{color:#101820;letter-spacing:.16em;text-transform:uppercase;
    font-size:2.4vmin}
  #cursor{display:inline-block;width:.5ch;color:#0a0e16;
    animation:blink 1s steps(2) infinite;text-shadow:0 0 8px rgba(255,255,255,.8)}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

  /* touch hint */
  #hint{
    position:fixed;left:50%;bottom:9vmin;transform:translateX(-50%);
    z-index:4;pointer-events:none;text-align:center;opacity:0;
    transition:opacity .8s ease}
  #hint.show{opacity:1;animation:hintPulse 2.4s ease-in-out infinite}
  #hint .ico{
    width:5vmin;height:5vmin;margin:0 auto 1.4vmin;border-radius:50%;
    border:1px solid rgba(0,0,0,.4);
    box-shadow:0 0 20px rgba(0,0,0,.12),inset 0 0 16px rgba(0,0,0,.06);
    display:flex;align-items:center;justify-content:center}
  #hint .ico::after{content:"";width:1.5vmin;height:1.5vmin;border-radius:50%;
    background:radial-gradient(circle,#333,#000);
    box-shadow:0 0 10px rgba(0,0,0,.35)}
  #hint .txt{font-size:2.1vmin;letter-spacing:.42em;text-transform:uppercase;
    color:#0a0e16;text-shadow:0 0 12px rgba(255,255,255,.6);
    padding-left:.42em}
  @keyframes hintPulse{0%,100%{opacity:.45;transform:translateX(-50%) translateY(0)}
    50%{opacity:1;transform:translateX(-50%) translateY(-1vmin)}}

  /* white flash */
  #white{position:fixed;inset:0;z-index:9;background:#fff;opacity:0;pointer-events:none}
</style>
</head>
<body>
  <canvas id="cv"></canvas>

  <div id="narr"></div>

  <div id="hint">
    <div class="ico"></div>
    <div class="txt">SENTUH SKRIN UNTUK MEMBUKA PORTAL MASA</div>
  </div>

  <div id="white"></div>

<script>
(() => {
  "use strict";

  // ══════════════════════════════════════════════
  //  CANVAS 2D SETUP
  // ══════════════════════════════════════════════
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ══════════════════════════════════════════════
  //  ANIMATION STATE (mirrors original GL uniforms)
  // ══════════════════════════════════════════════
  const U = { time: 0, spin: 0, blob: 1, haloOn: 0, halo: 1, hue: 0 };
  const tweens = [];
  const easeInCubic  = t => t*t*t;
  const easeInQuart  = t => t*t*t*t;
  const easeOutCubic = t => 1 - Math.pow(1-t, 3);
  const easeInQuad   = t => t*t;

  function tween(key, to, dur, ease) {
    for (let i = tweens.length-1; i >= 0; i--) if (tweens[i].key === key) tweens.splice(i, 1);
    tweens.push({ key, from: U[key], to, dur, start: performance.now(), ease: ease||(t=>t) });
  }
  function updateTweens(now) {
    for (let i = tweens.length-1; i >= 0; i--) {
      const tw = tweens[i]; let p = (now - tw.start) / tw.dur;
      if (p >= 1) { p = 1; tweens.splice(i, 1); }
      U[tw.key] = tw.from + (tw.to - tw.from) * tw.ease(Math.max(0, p));
    }
  }

  // ══════════════════════════════════════════════
  //  SIMPLEX-LIKE NOISE (smooth 2D pseudo-noise via sin sum)
  //  Good enough for an organic blob outline
  // ══════════════════════════════════════════════
  function sBlobR(angle, t, disp) {
    const n = Math.sin(angle * 3 + t * 0.28) * 0.18
            + Math.sin(angle * 5 - t * 0.19) * 0.10
            + Math.sin(angle * 7 + t * 0.11) * 0.05
            + Math.sin(angle * 2 - t * 0.34) * 0.07;
    return 1 + n * disp;
  }

  // iridescent cosine palette (mirrors GLSL pal())
  function palRGB(t) {
    const r = 0.5 + 0.5 * Math.cos(6.283 * (t));
    const g = 0.5 + 0.5 * Math.cos(6.283 * (t + 0.33));
    const b = 0.5 + 0.5 * Math.cos(6.283 * (t + 0.67));
    return [r, g, b];
  }
  function palCSS(t, alpha) {
    const [r,g,b] = palRGB(t);
    return `rgba(${(r*255)|0},${(g*255)|0},${(b*255)|0},${alpha??1})`;
  }

  // ══════════════════════════════════════════════
  //  DRAW ROUTINES
  // ══════════════════════════════════════════════
  function drawBackground(w, h, t, hue) {
    // mystic pastel background — mimic the WebGL nebula with layered radial gradients
    const cx = w / 2, cy = h / 2;

    // base: near-white
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);

    // drifting pastel tint overlay
    const tintA = palCSS(hue, 0.10);
    const tintB = palCSS(hue + 0.55, 0.08);
    const bg1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w,h) * 0.7);
    bg1.addColorStop(0, '#ffffff');
    bg1.addColorStop(0.45, tintA);
    bg1.addColorStop(1,   tintB);
    ctx.fillStyle = bg1;
    ctx.fillRect(0, 0, w, h);

    // second slow-drifting soft cloud
    const ox = Math.sin(t * 0.05) * w * 0.2;
    const oy = Math.cos(t * 0.04) * h * 0.15;
    const bg2 = ctx.createRadialGradient(cx+ox, cy+oy, 0, cx+ox, cy+oy, Math.max(w,h)*0.5);
    bg2.addColorStop(0, palCSS(hue + 0.3, 0.09));
    bg2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = bg2;
    ctx.fillRect(0, 0, w, h);
  }

  function drawHalo(w, h, t, haloOn, haloSpeed, hue) {
    if (haloOn < 0.01) return;
    const cx = w/2, cy = h/2;
    const maxR = Math.min(w, h) * 0.55;
    ctx.save();
    ctx.globalAlpha = haloOn;

    // large bright central glow
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.8);
    cg.addColorStop(0, 'rgba(255,255,255,0.92)');
    cg.addColorStop(0.5, 'rgba(255,255,255,0.55)');
    cg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, w, h);

    // animated concentric halo rings
    const ringCount = 7;
    const haloTint = palRGB(hue * 0.4 + 0.12);
    for (let i = 0; i < ringCount; i++) {
      const phase = (i / ringCount) + t * haloSpeed * 0.09;
      const rr = maxR * (0.15 + ((phase % 1) * 0.85));
      const alpha = 0.22 * Math.sin(Math.PI * (phase % 1)) * (1 - (phase%1)*0.5);
      if (alpha <= 0) continue;
      ctx.beginPath();
      ctx.arc(cx, cy, rr, 0, Math.PI*2);
      const [r,g,b] = haloTint;
      ctx.strokeStyle = `rgba(${(r*220)|0},${(g*220)|0},${(b*220)|0},${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBlob(w, h, t, blobAlpha, spin, hue) {
    if (blobAlpha < 0.01) return;
    const cx = w/2, cy = h/2;
    const baseR = Math.min(w, h) * 0.145;   // same relative size as original (half radius ~0.46 in norm space)
    const disp  = 0.15 + 0.055 * Math.sin(t * 0.4) + spin * 0.20;
    const rot   = t * (0.10 + spin * 9.0);
    const SEGS  = 64;

    ctx.save();
    ctx.globalAlpha = blobAlpha;
    ctx.translate(cx, cy);
    ctx.rotate(rot);

    // build blob path
    ctx.beginPath();
    for (let i = 0; i <= SEGS; i++) {
      const angle = (i / SEGS) * Math.PI * 2;
      const r = baseR * sBlobR(angle, t, disp);
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();

    // iridescent fill — conic-style via radial gradient with hue shift
    const hueShift = hue + spin * 0.7 + t * 0.04;
    const gr = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * 1.4);
    gr.addColorStop(0.00, palCSS(hueShift, 1));
    gr.addColorStop(0.30, palCSS(hueShift + 0.18, 1));
    gr.addColorStop(0.60, palCSS(hueShift + 0.35, 1));
    gr.addColorStop(0.85, palCSS(hueShift + 0.50, 1));
    gr.addColorStop(1.00, palCSS(hueShift + 0.65, 0.7));
    ctx.fillStyle = gr;
    ctx.fill();

    // fresnel rim — brighter outer edge (like pow(fres,2.3) highlight)
    const rim = ctx.createRadialGradient(0, 0, baseR * 0.5, 0, 0, baseR * 1.3);
    rim.addColorStop(0, 'rgba(255,255,255,0)');
    rim.addColorStop(0.7, 'rgba(255,255,255,0)');
    rim.addColorStop(1, `rgba(255,255,255,${0.45 + spin * 0.35})`);
    ctx.fillStyle = rim;
    ctx.fill();

    // spin → flash white (mirrors `mix(blobCol, vec3(1.7), uSpin^2 * 0.75)`)
    if (spin > 0.01) {
      ctx.fillStyle = `rgba(255,255,255,${Math.min(0.9, spin * spin * 0.8)})`;
      ctx.fill();
    }

    ctx.restore();

    // outer volumetric glow (additive-ish — drawn separately at low alpha)
    ctx.save();
    ctx.globalAlpha = blobAlpha * (0.5 * (0.6 + 0.4 * spin));
    const glow = ctx.createRadialGradient(cx, cy, baseR * 0.5, cx, cy, baseR * 3.5);
    glow.addColorStop(0, palCSS(hueShift + 0.35, 0.6));
    glow.addColorStop(1, palCSS(hueShift + 0.35, 0));
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // mild film grain (sampled each frame at low cost)
  function drawGrain(w, h) {
    const grain = ctx.createImageData(w, h);
    // only sample every 4th pixel for perf
    for (let i = 0; i < grain.data.length; i += 16) {
      const v = ((Math.random() - 0.5) * 0.025 * 255) | 0;
      grain.data[i]   = 128 + v;
      grain.data[i+1] = 128 + v;
      grain.data[i+2] = 128 + v;
      grain.data[i+3] = 10; // very subtle alpha
    }
    ctx.putImageData(grain, 0, 0);
  }

  // ── main render loop ──
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    U.time += dt;
    U.hue  += dt * 0.03;
    updateTweens(now);

    const w = cv.width, h = cv.height;
    const t = U.time, hue = U.hue;

    drawBackground(w, h, t, hue);
    drawHalo(w, h, t, U.haloOn, U.halo, hue);
    drawBlob(w, h, t, U.blob, U.spin, hue);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ══════════════════════════════════════════════
  //  AUDIO (identical to original)
  // ══════════════════════════════════════════════
  let AC = null, drone = null, droneGain = null;
  function ensureAudio() {
    if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      droneGain = AC.createGain(); droneGain.gain.value = 0.0; droneGain.connect(AC.destination);
      const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600; lp.connect(droneGain);
      [55, 82.5, 110].forEach((f, i) => {
        const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f*(1+i*0.003);
        const g = AC.createGain(); g.gain.value = 0.5/(i+1); o.connect(g); g.connect(lp); o.start();
        const lfo = AC.createOscillator(); lfo.frequency.value = 0.05 + i*0.02;
        const lg = AC.createGain(); lg.gain.value = 0.15; lfo.connect(lg); lg.connect(g.gain); lfo.start();
      });
      drone = lp;
      ramp(droneGain.gain, 0.18, 3.0);
    } catch(e) { AC = null; }
  }
  function ramp(param, to, sec) {
    if (!AC) return;
    param.cancelScheduledValues(AC.currentTime);
    param.setValueAtTime(param.value, AC.currentTime);
    param.linearRampToValueAtTime(to, AC.currentTime + sec);
  }
  function whoosh(rise) {
    if (!AC) return;
    const t0 = AC.currentTime;
    const len = AC.sampleRate * 1.4;
    const b = AC.createBuffer(1, len, AC.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 1.5);
    const src = AC.createBufferSource(); src.buffer = b;
    const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(300, t0); bp.frequency.exponentialRampToValueAtTime(3500, t0+1.2);
    const g = AC.createGain(); g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(0.3, t0+0.2); g.gain.exponentialRampToValueAtTime(0.001, t0+1.4);
    src.connect(bp); bp.connect(g); g.connect(AC.destination); src.start(t0); src.stop(t0+1.5);
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(rise ? 120 : 220, t0);
    o.frequency.exponentialRampToValueAtTime(rise ? 900 : 60, t0+1.3);
    const og = AC.createGain(); og.gain.setValueAtTime(0.0001, t0);
    og.gain.linearRampToValueAtTime(0.12, t0+0.3); og.gain.exponentialRampToValueAtTime(0.001, t0+1.4);
    const of = AC.createBiquadFilter(); of.type = 'lowpass'; of.frequency.value = 1800;
    o.connect(of); of.connect(og); og.connect(AC.destination); o.start(t0); o.stop(t0+1.5);
  }
  function tick() {
    if (!AC) return;
    const t0 = AC.currentTime;
    const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = 900 + Math.random()*400;
    const g = AC.createGain(); g.gain.setValueAtTime(0.04, t0); g.gain.exponentialRampToValueAtTime(0.0008, t0+0.08);
    o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+0.1);
  }

  // BGM
  const bgm = new Audio('../project-08-intro/Assets/enter_bgm.mp3');
  bgm.preload = 'auto';
  let bgmFade = null;
  function playBgm() {
    if (bgmFade) { clearInterval(bgmFade); bgmFade = null; }
    try { bgm.currentTime = 0; } catch(e) {}
    bgm.volume = 1; bgm.play().catch(() => {});
  }
  function fadeBgmOut(dur) {
    if (bgmFade) clearInterval(bgmFade);
    const step = 50, dec = bgm.volume / (dur / step);
    bgmFade = setInterval(() => {
      bgm.volume = Math.max(0, bgm.volume - dec);
      if (bgm.volume <= 0) { clearInterval(bgmFade); bgmFade = null; bgm.pause(); }
    }, step);
  }
  function stopBgm() {
    if (bgmFade) { clearInterval(bgmFade); bgmFade = null; }
    bgm.pause(); try { bgm.currentTime = 0; } catch(e) {}
  }

  // ══════════════════════════════════════════════
  //  WHITE FADE
  // ══════════════════════════════════════════════
  const wf = document.getElementById('white');
  function fadeWhite(to, dur) {
    wf.style.transition = `opacity ${dur}ms ${to > 0.5 ? 'ease-in' : 'ease-out'}`;
    requestAnimationFrame(() => { wf.style.opacity = to; });
  }

  // ══════════════════════════════════════════════
  //  NARRATION (identical to original, BM only)
  // ══════════════════════════════════════════════
  const narr = document.getElementById('narr');
  const LINES = [
    { c: "first", bm: "Selamat datang, Pengembara Masa." },
    { bm: "Ini adalah sebuah Kapsul Masa: Kisah, Refleksi dan Kewangan" },
    { bm: "oleh Muzium dan Galeri Seni Bank Negara Malaysia" },
    { bm: "yang menyimpan kisah perjalanan" },
    { bm: "bagaimana kewangan dan budaya berkembang seiring" },
    { bm: "dalam membentuk sebuah negara yang bersatu." },
    { c: "accent", bm: "Aktifkan kapsul masa.." },
    { bm: "kembali ke Masa Lalu," },
    { bm: "Masa Kini" },
    { bm: "dan Masa Hadapan" },
    { bm: "Pengembaraan masa anda bermula sekarang." }
  ];
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  function charDelay(ch) {
    if (ch === '.' || ch === ',') return 300;
    if (ch === ' ') return 28;
    return 40;
  }
  let narrToken = 0;
  async function startNarration() {
    const mine = ++narrToken;
    narr.innerHTML = ''; narr.classList.add('show');
    const cursor = document.createElement('span'); cursor.id = 'cursor'; cursor.textContent = '▍';
    for (let i = 0; i < LINES.length; i++) {
      if (mine !== narrToken) return;
      const line = document.createElement('div');
      line.className = 'nline' + (LINES[i].c ? (' ' + LINES[i].c) : '');
      narr.appendChild(line); line.appendChild(cursor);
      const txt = LINES[i].bm;
      for (let c = 0; c < txt.length; c++) {
        if (mine !== narrToken) return;
        line.insertBefore(document.createTextNode(txt[c]), cursor);
        if (c % 3 === 0) tick();
        await sleep(charDelay(txt[c]));
      }
      await sleep(540);
    }
    if (mine !== narrToken) return;
    cursor.remove();
    await sleep(700);
    if (mine !== narrToken) return;
    narrationDone();
  }

  // ══════════════════════════════════════════════
  //  HINT
  // ══════════════════════════════════════════════
  const hint = document.getElementById('hint');
  function showHint() { hint.classList.add('show'); }
  function hideHint() { hint.classList.remove('show'); }

  // ══════════════════════════════════════════════
  //  STATE MACHINE (identical to original)
  // ══════════════════════════════════════════════
  let state = 'START', locked = false;
  const timers = [];
  function later(fn, ms) { timers.push(setTimeout(fn, ms)); }
  function clearTimers() { timers.forEach(clearTimeout); timers.length = 0; }

  function toStart() {
    state = 'START'; locked = false;
    narrToken++; narr.classList.remove('show'); narr.innerHTML = '';
    U.haloOn = 0; U.blob = 1; U.spin = 0; U.halo = 1;
    showHint();
  }

  function transitionIn() {
    state = 'TRANS_IN'; locked = true; hideHint(); whoosh(true);
    tween('spin', 1, 2800, easeInQuart);
    later(() => fadeWhite(1, 700), 2150);
    later(() => {
      U.haloOn = 1; U.blob = 0; U.spin = 0; U.halo = 1;
      state = 'MIDDLE';
      fadeWhite(0, 850);
      ramp(droneGain && droneGain.gain, 0.12, 2.0);
      startNarration();
    }, 2850);
  }

  function narrationDone() {
    state = 'MIDDLE_WAIT';
    tween('blob', 1, 1300, easeOutCubic);
    later(() => { showHint(); locked = false; }, 700);
  }

  function transitionOut() {
    state = 'TRANS_OUT'; locked = true; hideHint(); whoosh(true);
    narrToken++; narr.classList.remove('show');
    playBgm();
    ramp(droneGain && droneGain.gain, 0.0, 0.5);
    tween('spin', 1, 2600, easeInQuart);
    tween('halo', 7, 5000, easeInQuad);
    later(() => { fadeWhite(1, 800); fadeBgmOut(2800); }, 5000);
    later(() => {
      stopBgm();
      toStart();
      fadeWhite(0, 950);
      ramp(droneGain && droneGain.gain, 0.18, 2.0);
    }, 8000);
  }

  // ── input ──
  function onTap() {
    ensureAudio();
    if (locked) return;
    if (state === 'START')       { transitionIn(); }
    else if (state === 'MIDDLE_WAIT') { transitionOut(); }
  }
  window.addEventListener('pointerdown', onTap);

  // ── kiosk hardening ──
  function goFull() {
    if (document.fullscreenElement) return;
    const el = document.documentElement;
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (fn) { const p = fn.call(el); if (p && p.catch) p.catch(() => {}); }
  }
  goFull();
  window.addEventListener('load', goFull, { once: true });
  ['pointerdown','touchstart','keydown'].forEach(ev =>
    window.addEventListener(ev, goFull, { once: true }));
  window.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
  window.addEventListener('gesturestart', e => e.preventDefault());

  // boot
  toStart();
})();
</script>
</body>
</html>
