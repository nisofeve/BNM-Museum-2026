<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P03 Position Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

#controls {
  width: 290px;
  flex-shrink: 0;
  background: #16213e;
  border-right: 2px solid #0f3460;
  padding: 16px 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
#controls h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  color: #6DC83A;
}
.sec { display: flex; flex-direction: column; gap: 10px; }
.sec-title {
  font-family: 'Fredoka One', cursive;
  font-size: 12px;
  color: #A8D8EA;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #0f3460;
  padding-bottom: 3px;
}
.row { display: flex; flex-direction: column; gap: 4px; }
.row label {
  font-size: 12px;
  color: #aaa;
  display: flex;
  justify-content: space-between;
}
.row label b {
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  color: #FFF8E1;
}
input[type=range] { width: 100%; accent-color: #6DC83A; cursor: pointer; }

#css-out {
  background: #0f1e3d;
  border: 1px solid #A8D8EA33;
  border-radius: 8px;
  padding: 10px;
  font-family: 'Courier New', monospace;
  font-size: 10.5px;
  color: #A8D8EA;
  line-height: 1.75;
  white-space: pre;
  overflow-x: auto;
}
#copy-btn {
  background: #6DC83A;
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  padding: 8px;
  cursor: pointer;
  width: 100%;
  transition: background 0.15s;
}
#copy-btn:hover { background: #4E9E20; }
#copy-btn.ok { background: #C8934A; }

#refresh-btn {
  background: #0f3460;
  color: #A8D8EA;
  font-family: 'Fredoka One', cursive;
  font-size: 13px;
  border: 1px solid #A8D8EA44;
  border-radius: 8px;
  padding: 6px;
  cursor: pointer;
  width: 100%;
}
#refresh-btn:hover { background: #1a4a80; }

#status {
  font-size: 11px;
  color: #888;
  text-align: center;
  min-height: 16px;
}

#preview-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#preview-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
</style>
</head>
<body>

<div id="controls">
  <h1>Position Editor</h1>
  <div id="status">Loading…</div>
  <button id="refresh-btn" onclick="initFrame()">↺ Reload Preview</button>

  <div class="sec">
    <div class="sec-title">Speech Bubble</div>
    <div class="row">
      <label>translateY <b id="v-by">167</b>px</label>
      <input type="range" id="sl-by" min="-50" max="400" value="167" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Char Wrap</div>
    <div class="row">
      <label>translateY <b id="v-cy">-2</b>px</label>
      <input type="range" id="sl-cy" min="-100" max="300" value="-2" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Nameplate</div>
    <div class="row">
      <label>margin-top <b id="v-mt">-41</b>px</label>
      <input type="range" id="sl-mt" min="-150" max="80" value="-41" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">CSS Output</div>
    <pre id="css-out"></pre>
    <button id="copy-btn" onclick="copyCSS()">Copy CSS</button>
  </div>
</div>

<div id="preview-wrap">
  <iframe id="frame" src="./index.html"></iframe>
</div>

<script>
const frame    = document.getElementById('frame');
const statusEl = document.getElementById('status');

const slBy = document.getElementById('sl-by');
const slCy = document.getElementById('sl-cy');
const slMt = document.getElementById('sl-mt');

function post(msg) {
  try { frame.contentWindow.postMessage(msg, '*'); } catch(e) {}
}

function buildCSS() {
  const by = parseInt(slBy.value);
  const cy = parseInt(slCy.value);
  const mt = parseInt(slMt.value);
  document.getElementById('v-by').textContent = by;
  document.getElementById('v-cy').textContent = cy;
  document.getElementById('v-mt').textContent = mt;
  return `
.bubble-col {
  transform: translateX(-50%) translateY(${by}px) !important;
}
.char-wrap {
  transform: translateY(${cy}px) !important;
}
.presenter-tag {
  margin-top: ${mt}px !important;
}`;
}

function updateOutput() {
  const by = parseInt(slBy.value);
  const cy = parseInt(slCy.value);
  const mt = parseInt(slMt.value);
  document.getElementById('css-out').textContent =
`.bubble-col {
  transform: translateX(-50%) translateY(${by}px);
}

.char-wrap {
  transform: translateY(${cy}px);
}

.presenter-tag {
  margin-top: ${mt}px;
}`;
}

function applyCSS() {
  post({ type: 'pos-editor', css: buildCSS() });
  updateOutput();
}

function initFrame() {
  statusEl.textContent = 'Loading…';
  frame.src = './index.html?' + Date.now(); // bust cache
}

frame.addEventListener('load', () => {
  statusEl.textContent = 'Navigating to input…';
  // give the app JS time to finish init, then navigate + apply
  setTimeout(() => {
    post({ type: 'pos-editor', goto: 'input', css: buildCSS() });
    statusEl.textContent = 'Live — drag sliders';
    updateOutput();
  }, 600);
});

slBy.addEventListener('input', applyCSS);
slCy.addEventListener('input', applyCSS);
slMt.addEventListener('input', applyCSS);
updateOutput();

function copyCSS() {
  const text = document.getElementById('css-out').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => flash());
  } else {
    // fallback for file:// where clipboard API may be restricted
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    flash();
  }
}
function flash() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copied!';
  btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'Copy CSS'; btn.classList.remove('ok'); }, 1500);
}
</script>
</body>
</html>
