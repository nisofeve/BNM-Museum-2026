<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P03 Position Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── CONTROLS ── */
#controls {
  width: 290px;
  flex-shrink: 0;
  background: #16213e;
  border-right: 2px solid #0f3460;
  padding: 16px 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
#controls h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 17px;
  color: #6DC83A;
}
.sec {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.sec-title {
  font-family: 'Fredoka One', cursive;
  font-size: 12px;
  color: #A8D8EA;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #0f3460;
  padding-bottom: 3px;
}
.row {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.row label {
  font-size: 12px;
  color: #aaa;
  display: flex;
  justify-content: space-between;
}
.row label b {
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  color: #FFF8E1;
}
input[type=range] {
  width: 100%;
  accent-color: #6DC83A;
  cursor: pointer;
}

/* CSS output */
#css-out {
  background: #0f1e3d;
  border: 1px solid #A8D8EA33;
  border-radius: 8px;
  padding: 10px;
  font-family: 'Courier New', monospace;
  font-size: 10.5px;
  color: #A8D8EA;
  line-height: 1.75;
  white-space: pre;
  overflow-x: auto;
}
#copy-btn {
  background: #6DC83A;
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  padding: 8px;
  cursor: pointer;
  width: 100%;
  transition: background 0.15s;
}
#copy-btn:hover { background: #4E9E20; }
#copy-btn.ok { background: #C8934A; }

#status {
  font-size: 11px;
  color: #888;
  text-align: center;
  min-height: 16px;
}

/* ── PREVIEW (iframe) ── */
#preview-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#preview-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
#iframe-overlay {
  position: absolute;
  inset: 0;
  background: rgba(22,33,62,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: #A8D8EA;
  pointer-events: none;
  transition: opacity 0.4s;
}
#iframe-overlay.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="controls">
  <h1>Position Editor</h1>
  <div id="status">Loading…</div>

  <div class="sec">
    <div class="sec-title">Speech Bubble</div>
    <div class="row">
      <label>translateY <b id="v-by">167</b>px</label>
      <input type="range" id="sl-by" min="-50" max="400" value="167" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Char Wrap</div>
    <div class="row">
      <label>translateY <b id="v-cy">-2</b>px</label>
      <input type="range" id="sl-cy" min="-100" max="300" value="-2" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Nameplate</div>
    <div class="row">
      <label>margin-top <b id="v-mt">-41</b>px</label>
      <input type="range" id="sl-mt" min="-150" max="80" value="-41" step="1">
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">CSS Output</div>
    <pre id="css-out"></pre>
    <button id="copy-btn" onclick="copyCSS()">Copy CSS</button>
  </div>
</div>

<div id="preview-wrap">
  <iframe id="frame" src="./index.html"></iframe>
  <div id="iframe-overlay">Loading real preview…</div>
</div>

<script>
const frame    = document.getElementById('frame');
const overlay  = document.getElementById('iframe-overlay');
const statusEl = document.getElementById('status');

const slBy = document.getElementById('sl-by');
const slCy = document.getElementById('sl-cy');
const slMt = document.getElementById('sl-mt');

let ready = false;
let styleEl = null;

frame.addEventListener('load', () => {
  try {
    const win = frame.contentWindow;
    const doc = frame.contentDocument;

    // Inject override style tag
    styleEl = doc.createElement('style');
    styleEl.id = 'pos-editor-overrides';
    doc.head.appendChild(styleEl);

    // Navigate to input screen
    if (typeof win.goToScreen === 'function') {
      win.goToScreen('input');
    }

    ready = true;
    overlay.classList.add('hidden');
    statusEl.textContent = 'Live — drag sliders';
    applyCSS();
  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
  }
});

function applyCSS() {
  const by = parseInt(slBy.value);
  const cy = parseInt(slCy.value);
  const mt = parseInt(slMt.value);

  document.getElementById('v-by').textContent = by;
  document.getElementById('v-cy').textContent = cy;
  document.getElementById('v-mt').textContent = mt;

  const css = `
.bubble-col {
  transform: translateX(-50%) translateY(${by}px) !important;
}
.char-wrap {
  transform: translateY(${cy}px) !important;
}
.presenter-tag {
  margin-top: ${mt}px !important;
}`;

  if (styleEl) styleEl.textContent = css;

  document.getElementById('css-out').textContent =
`.bubble-col {
  transform: translateX(-50%) translateY(${by}px);
}

.char-wrap {
  transform: translateY(${cy}px);
}

.presenter-tag {
  margin-top: ${mt}px;
}`;
}

slBy.addEventListener('input', applyCSS);
slCy.addEventListener('input', applyCSS);
slMt.addEventListener('input', applyCSS);
applyCSS();

function copyCSS() {
  navigator.clipboard.writeText(document.getElementById('css-out').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy CSS'; btn.classList.remove('ok'); }, 1500);
  });
}
</script>
</body>
</html>
