<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P03 Position Editor — Si Kijang</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── LEFT PANEL: controls ── */
#controls {
  width: 300px;
  flex-shrink: 0;
  background: #16213e;
  border-right: 2px solid #0f3460;
  padding: 20px 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

#controls h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 18px;
  color: #6DC83A;
  letter-spacing: 0.5px;
}

.section-title {
  font-family: 'Fredoka One', cursive;
  font-size: 13px;
  color: #A8D8EA;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid #0f3460;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.control-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.control-row label {
  font-size: 12px;
  color: #aaa;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.control-row label span {
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  color: #FFF8E1;
  min-width: 48px;
  text-align: right;
}

.control-row input[type=range] {
  width: 100%;
  accent-color: #6DC83A;
  height: 4px;
  cursor: pointer;
}

.control-row input[type=number] {
  width: 80px;
  background: #0f3460;
  border: 1px solid #6DC83A;
  border-radius: 6px;
  color: #FFF8E1;
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  padding: 4px 8px;
  text-align: center;
}

/* CSS output */
#css-output-box {
  background: #0f3460;
  border: 1px solid #A8D8EA44;
  border-radius: 8px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  color: #A8D8EA;
  line-height: 1.7;
  white-space: pre;
  overflow-x: auto;
}

#copy-btn {
  background: #6DC83A;
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.15s;
  width: 100%;
}
#copy-btn:hover { background: #4E9E20; }
#copy-btn.copied { background: #C8934A; }

/* ── RIGHT PANEL: preview ── */
#preview-wrap {
  flex: 1;
  background: #A8D8EA;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#preview-label {
  position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  z-index: 100;
  white-space: nowrap;
}

/* sky clouds */
#prev-sky {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #A8D8EA 0%, #D6EEFF 100%);
  overflow: hidden;
}
.p-cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.82;
}
.p-cloud::before, .p-cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}

/* grass strip at bottom of preview */
#prev-grass {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 18%;
  background: #5CB85C;
  border-top: 4px solid #3A9E3A;
}

/* ── presenter stage in preview ── */
#prev-stage {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  height: 54vh;
  width: min(920px, 96%);
  /* reference box — does not clip */
  outline: 1px dashed rgba(255,255,255,0.3);
}

#prev-bubble-col {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: min(580px, 72%);
  display: flex;
  flex-direction: column;
  gap: 7px;
  z-index: 15;
}

.prev-bubble {
  background: #FFFBF0;
  border: 3px solid #C8934A;
  border-radius: 20px;
  border-bottom-left-radius: 6px;
  padding: 12px 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.13);
  position: relative;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  color: #4a3520;
}
/* tail down */
.prev-bubble::before {
  content: '';
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  border: 9px solid transparent;
  border-top-color: #C8934A;
}
.prev-bubble::after {
  content: '';
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: #FFFBF0;
}

#prev-char-wrap {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

#prev-char {
  position: relative;
  width: auto;
  height: min(261px, 38vh);
  aspect-ratio: 177 / 261;
}
#prev-char img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

#prev-tag {
  background: #6DC83A;
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  padding: 3px 14px;
  border-radius: 14px;
  white-space: nowrap;
  box-shadow: 0 3px 8px rgba(78,158,32,0.3);
}

/* divider line showing 54vh */
#stage-divider {
  position: absolute;
  left: 0; right: 0;
  top: 54vh;
  border-top: 2px dashed rgba(255,255,255,0.6);
  z-index: 50;
  pointer-events: none;
}
#stage-divider::after {
  content: '── answer panel starts here ──';
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  background: rgba(0,0,0,0.3);
  padding: 1px 8px;
  border-radius: 10px;
}
</style>
</head>
<body>

<!-- ══ CONTROLS ══ -->
<div id="controls">
  <h1>Position Editor</h1>

  <div>
    <div class="section-title">Bubble Col</div>
    <div class="control-group">
      <div class="control-row">
        <label>translateY <span id="val-bubble-y">100</span>px</label>
        <input type="range" id="sl-bubble-y" min="-100" max="300" value="100" step="1">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">Char Wrap</div>
    <div class="control-group">
      <div class="control-row">
        <label>translateY <span id="val-char-y">100</span>px</label>
        <input type="range" id="sl-char-y" min="-100" max="300" value="100" step="1">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">Nameplate (presenter-tag)</div>
    <div class="control-group">
      <div class="control-row">
        <label>margin-top <span id="val-tag-mt">0</span>px</label>
        <input type="range" id="sl-tag-mt" min="-150" max="80" value="0" step="1">
      </div>
    </div>
  </div>

  <div>
    <div class="section-title">CSS Output</div>
    <pre id="css-output-box"></pre>
    <button id="copy-btn" onclick="copyCSS()">Copy CSS</button>
  </div>
</div>

<!-- ══ PREVIEW ══ -->
<div id="preview-wrap">
  <div id="prev-sky">
    <div class="p-cloud" style="width:180px;height:50px;top:8%;left:10%"></div>
    <div class="p-cloud" style="width:130px;height:38px;top:18%;left:55%"></div>
    <div class="p-cloud" style="width:100px;height:30px;top:5%;left:70%"></div>
  </div>
  <div id="prev-grass"></div>
  <div id="stage-divider"></div>

  <div id="prev-stage">
    <!-- bubbles -->
    <div id="prev-bubble-col">
      <div class="prev-bubble">Berapa umur anda?</div>
    </div>
    <!-- character -->
    <div id="prev-char-wrap">
      <div id="prev-char">
        <img src="../Assets/kijang_idle.png" alt="Si Kijang">
      </div>
      <div id="prev-tag">Si Kijang</div>
    </div>
  </div>

  <div id="preview-label">Live Preview — drag sliders on the left</div>
</div>

<script>
const slBubbleY = document.getElementById('sl-bubble-y');
const slCharY   = document.getElementById('sl-char-y');
const slTagMt   = document.getElementById('sl-tag-mt');

const valBubbleY = document.getElementById('val-bubble-y');
const valCharY   = document.getElementById('val-char-y');
const valTagMt   = document.getElementById('val-tag-mt');

const prevBubbleCol  = document.getElementById('prev-bubble-col');
const prevCharWrap   = document.getElementById('prev-char-wrap');
const prevTag        = document.getElementById('prev-tag');
const cssOut         = document.getElementById('css-output-box');

function update() {
  const by  = parseInt(slBubbleY.value);
  const cy  = parseInt(slCharY.value);
  const tmt = parseInt(slTagMt.value);

  valBubbleY.textContent = by;
  valCharY.textContent   = cy;
  valTagMt.textContent   = tmt;

  prevBubbleCol.style.transform = `translateX(-50%) translateY(${by}px)`;
  prevCharWrap.style.transform  = `translateX(-50%) translateY(${cy}px)`;
  prevTag.style.marginTop       = tmt + 'px';

  cssOut.textContent =
`.bubble-col {
  transform: translateX(-50%) translateY(${by}px);
}

.char-wrap {
  transform: translateY(${cy}px);
}

.presenter-tag {
  margin-top: ${tmt}px;
}`;
}

slBubbleY.addEventListener('input', update);
slCharY.addEventListener('input', update);
slTagMt.addEventListener('input', update);
update();

function copyCSS() {
  navigator.clipboard.writeText(cssOut.textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy CSS'; btn.classList.remove('copied'); }, 1500);
  });
}
</script>
</body>
</html>
