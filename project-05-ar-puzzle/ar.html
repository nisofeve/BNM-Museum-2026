<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AR Experience</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 999;
    }

    #scan-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 240px; height: 240px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      animation: pulse-border 2s ease-in-out infinite;
    }
    #scan-ring::before, #scan-ring::after {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-color: #00e5ff;
      border-style: solid;
    }
    #scan-ring::before {
      top: -2px; left: -2px;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0;
    }
    #scan-ring::after {
      bottom: -2px; right: -2px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0;
    }

    #scan-line {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 220px; height: 2px;
      background: linear-gradient(90deg, transparent, #00e5ff, transparent);
      animation: scan-move 2.5s ease-in-out infinite;
      box-shadow: 0 0 8px #00e5ff;
    }

    #corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    #corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    #corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    #corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .corner { position: absolute; width: 30px; height: 30px; border-color: #00e5ff; border-style: solid; }

    #hint-text {
      position: absolute;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      letter-spacing: 1px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0,229,255,0.5);
      animation: fade-pulse 2s ease-in-out infinite;
      white-space: nowrap;
    }

    #status-badge {
      position: absolute;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 20px;
      padding: 6px 16px;
      color: #00e5ff;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    #found-flash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,229,255,0.15);
      opacity: 0;
      pointer-events: none;
      z-index: 998;
      transition: opacity 0.2s;
    }
    #found-flash.active { opacity: 1; }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(255,255,255,0.1); }
      50% { border-color: rgba(0,229,255,0.3); }
    }
    @keyframes scan-move {
      0% { top: calc(50% - 110px); }
      50% { top: calc(50% + 110px); }
      100% { top: calc(50% - 110px); }
    }
    @keyframes fade-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .a-loader-title { display: none !important; }
    .a-enter-vr-button { display: none !important; }
    canvas { display: block; }

    /* MindAR injects a camera <video> — ensure it's never hidden */
    a-scene video:not([id]) {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* ── Start screen ── */
    #start-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #080c14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 32px;
      text-align: center;
    }
    #start-screen > * { margin-bottom: 20px; }
    #start-screen > *:last-child { margin-bottom: 0; }
    #start-screen.hidden { display: none; }

    #start-icon {
      width: 72px; height: 72px;
      border: 2px solid rgba(0,229,255,0.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      animation: pulse-border 2s ease-in-out infinite;
    }

    #start-title {
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    #start-subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      line-height: 1.6;
      max-width: 260px;
    }

    #start-btn {
      margin-top: 8px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #00b8d9, #00e5ff);
      color: #000;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(0,229,255,0.35);
      -webkit-tap-highlight-color: transparent;
    }

    #start-error {
      color: #ff5252;
      font-size: 13px;
      display: none;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- debug HUD: open ar.html?debug to verify autoplay -->
  <pre id="vid-debug" style="position:fixed;top:8px;left:8px;z-index:1000;margin:0;
       padding:8px 10px;background:rgba(0,0,0,.65);color:#0f0;font:12px/1.4 monospace;
       border-radius:6px;display:none;pointer-events:none;white-space:pre"></pre>

  <!-- Start screen — shown until user taps -->
  <div id="start-screen">
    <div id="start-icon">📷</div>
    <div id="start-title">AR Scanner</div>
    <div id="start-subtitle">Tap below to enable your camera and start the AR experience.</div>
    <button id="start-btn" onclick="startAR()">Tap to Start</button>
    <div id="start-error"></div>
  </div>

  <div id="found-flash"></div>

  <div id="ui-overlay">
    <div id="status-badge">AR SCANNER</div>
    <div id="scan-ring">
      <div class="corner" id="corner-tl"></div>
      <div class="corner" id="corner-tr"></div>
      <div class="corner" id="corner-bl"></div>
      <div class="corner" id="corner-br"></div>
    </div>
    <div id="scan-line"></div>
    <div id="hint-text">Point camera at the target image</div>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: Assets/targets.mind; autoStart: false;"
    renderer="colorManagement: true; precision: medium;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    id="arscene"
  >

    <a-assets timeout="30000">
      <video id="ar-video"
        src="Assets/Animated-1399.mp4"
        loop playsinline webkit-playsinline
        crossorigin="anonymous"
      ></video>
      <video id="ar-video-2"
        src="Assets/Animated-1883.mp4"
        loop playsinline webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- targets.mind index 0 = A01-1399 (verified: 2102x2560) → plays Animated-1399 -->
    <a-entity mindar-image-target="targetIndex: 0" id="marker-0">
      <!-- Plane matches A01-1399.jpg aspect: 2102×2560 → width:height = 1:1.2179 -->
      <a-plane
        src="#ar-video"
        width="1"
        height="1.2179"
        position="0 0 0"
        rotation="0 0 0"
        material="shader: flat; side: double; depthTest: false; transparent: false;"
      ></a-plane>
    </a-entity>

    <!-- targets.mind index 1 = A01-1883 (verified: 2560x1788) → plays Animated-1883 -->
    <a-entity mindar-image-target="targetIndex: 1" id="marker-1">
      <!-- Plane matches A01-1883.jpg aspect: 2560×1788 → width:height = 1:0.6984 -->
      <a-plane
        src="#ar-video-2"
        width="1"
        height="0.6984"
        position="0 0 0"
        rotation="0 0 0"
        material="shader: flat; side: double; depthTest: false; transparent: false;"
      ></a-plane>
    </a-entity>

    <a-light type="ambient" color="#ffffff" intensity="1"></a-light>

  </a-scene>

  <script>
    const hint  = document.getElementById('hint-text');
    const flash = document.getElementById('found-flash');
    const badge = document.getElementById('status-badge');

    // ── Keep the start button disabled until BOTH A-Frame has loaded AND
    // MindAR's system is registered in scene.systems. On some phones the
    // 'loaded' event fires before MindAR finishes registering, so we poll
    // every 100ms rather than relying solely on the event.
    (function () {
      const scene = document.getElementById('arscene');
      const btn   = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      const started = Date.now();
      function checkReady() {
        if (scene.hasLoaded && scene.systems['mindar-image-system']) {
          btn.disabled = false;
          btn.textContent = 'Tap to Start';
        } else if (Date.now() - started > 20000) {
          // Scripts failed to load (CDN down / no network) — tell the user
          btn.disabled = false;
          btn.textContent = 'Tap to Retry';
          btn.onclick = () => location.reload();
          document.getElementById('start-error').textContent =
            'Failed to load AR engine. Check your connection and try again.';
          document.getElementById('start-error').style.display = 'block';
        } else {
          setTimeout(checkReady, 100);
        }
      }
      checkReady();
    })();

    // ── Show a retry prompt. Page reload is the most reliable recovery —
    // camera permission is already stored so the second load is clean.
    function showRetry(msg) {
      const screen = document.getElementById('start-screen');
      screen.classList.remove('hidden');
      const btn = document.getElementById('start-btn');
      btn.disabled = false;
      btn.textContent = 'Tap to Retry';
      btn.onclick = () => location.reload();
      const errEl = document.getElementById('start-error');
      errEl.textContent = msg || '';
      errEl.style.display = msg ? 'block' : 'none';
    }

    // ── Returns true only when we can CONFIRM the camera feed is not rendering.
    // Uses video element state instead of gl.readPixels — readPixels always
    // returns zeros when A-Frame's preserveDrawingBuffer is false (the default),
    // which made the pixel approach fire false positives on every Android device.
    function confirmBlack() {
      const camVids = [...document.querySelectorAll('video:not([id])')];
      if (camVids.length === 0) return false; // MindAR renders in WebGL directly — can't confirm
      return camVids.every(v => v.videoWidth === 0 || v.readyState < 2);
    }

    // ── Main start — async so we can await arSystem.start(), but contains
    // NO macrotask delays (no setTimeout awaits). The microtask chain keeps
    // the browser's user-gesture context alive on both iOS and Android.
    async function startAR() {
      const btn    = document.getElementById('start-btn');
      const errEl  = document.getElementById('start-error');
      const screen = document.getElementById('start-screen');

      btn.disabled = true;
      btn.textContent = 'Opening camera…';
      errEl.style.display = 'none';

      // Use the tap gesture to unlock audio on asset videos.
      // Correct unlock sequence: play() MUTED first (always allowed), then unmute on success.
      // Setting muted=false before play() can cause the play() itself to be blocked on some
      // browsers, and breaks the safety-net check below.
      const needsUnlock = new Set(document.querySelectorAll('video[id]'));
      needsUnlock.forEach(v => {
        v.muted = true; // keep muted so play() is guaranteed to be allowed
        const p = v.play();
        if (p) p.then(() => {
          v.muted = false;       // unmute AFTER play() succeeds — audio is now unlocked
          v.pause();
          v.currentTime = 0;
          needsUnlock.delete(v); // mark as done so safety net skips it
        }).catch(() => { /* video not loaded yet — safety net will retry */ });
      });

      const scene    = document.getElementById('arscene');
      const arSystem = scene.systems['mindar-image-system'];

      // Watch specifically for new <video> nodes MindAR injects (not all DOM mutations).
      // Only reacts to addedNodes that are or contain a video, avoiding unnecessary
      // play() calls from A-Frame's own internal DOM churn during startup.
      const camObserver = new MutationObserver((mutations) => {
        for (const mut of mutations) {
          mut.addedNodes.forEach(node => {
            const vids = node.tagName === 'VIDEO' ? [node]
              : node.querySelectorAll ? [...node.querySelectorAll('video')] : [];
            vids.filter(v => !v.id).forEach(v => {
              v.muted = true;
              v.playsInline = true;              // DOM property — correct for iOS 10+
              v.setAttribute('playsinline', ''); // attribute — belt-and-suspenders
              v.play().catch(() => {});
            });
          });
        }
      });
      camObserver.observe(document.body, { childList: true, subtree: true });

      try {
        // await preserves microtask chain — iOS gesture context stays intact.
        // MindAR's getUserMedia fires here, within the user gesture.
        await arSystem.start();
      } catch (err) {
        camObserver.disconnect();
        btn.disabled = false;
        btn.textContent = 'Tap to Start';
        let msg = 'Camera access denied. Please allow camera permission and try again.';
        if (err.name === 'NotFoundError')        msg = 'No camera found on this device.';
        if (err.name === 'NotReadableError')     msg = 'Camera is in use by another app. Close it and try again.';
        if (err.name === 'OverconstrainedError') {
          showRetry('Camera could not be started. Tap to try again.');
          return;
        }
        errEl.textContent = msg;
        errEl.style.display = 'block';
        return;
      }

      // start() resolved = camera stream is open. Hide the start screen now.
      screen.classList.add('hidden');
      camObserver.disconnect();

      // Safety net: retry unlock for any videos whose play() failed above
      // (e.g. video hadn't loaded yet when the gesture fired).
      needsUnlock.forEach(v => {
        v.muted = true;
        const p = v.play();
        if (p) p.then(() => {
          v.muted = false;
          v.pause();
          v.currentTime = 0;
        }).catch(() => {});
      });

      // Secondary watchdog: on some Android phones the stream opens but the
      // camera video never gets valid dimensions. Check once after 6s.
      setTimeout(() => {
        if (confirmBlack()) showRetry('Camera feed not showing. Tap to try again.');
      }, 6000);
    }

    // map each target to its video
    const TARGETS = [
      { marker: 'marker-0', video: 'ar-video'   }, // A01-1399 → Animated-1399
      { marker: 'marker-1', video: 'ar-video-2' }  // A01-1883 → Animated-1883
    ];

    TARGETS.forEach(({ marker, video }) => {
      const m = document.getElementById(marker);
      const v = document.getElementById(video);

      m.addEventListener('targetFound', () => {
        hint.textContent = 'Image detected!';
        flash.classList.add('active');
        badge.textContent = 'AR TRACKING';
        badge.style.borderColor = 'rgba(0,229,255,0.8)';
        setTimeout(() => flash.classList.remove('active'), 400);
        if (v) { v.currentTime = 0; v.play().catch(() => {}); }
      });

      m.addEventListener('targetLost', () => {
        hint.textContent = 'Point camera at the target image';
        badge.textContent = 'AR SCANNER';
        badge.style.borderColor = 'rgba(0,229,255,0.3)';
        if (v) v.pause();
      });
    });

    // ── autoplay debug HUD (?debug) ──
    if (location.search.indexOf('debug') !== -1) {
      const dbg = document.getElementById('vid-debug');
      dbg.style.display = 'block';
      const v1 = document.getElementById('ar-video');
      const v2 = document.getElementById('ar-video-2');
      const line = (label, v) =>
        `${label}: ${v.paused ? 'PAUSED' : 'PLAYING'}  t=${v.currentTime.toFixed(2)}` +
        `  ready=${v.readyState}  ${v.videoWidth}x${v.videoHeight}` +
        (v.error ? `  ERR=${v.error.code}` : '');
      setInterval(() => {
        dbg.textContent =
          line('1399(#ar-video)', v1) + '\n' +
          line('1883(#ar-video-2)', v2);
        dbg.style.color = (!v1.paused && !v2.paused) ? '#0f0' : '#ff5';
      }, 250);
    }
  </script>

</body>
</html>
