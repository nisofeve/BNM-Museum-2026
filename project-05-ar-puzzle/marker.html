<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Marker — Print or Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
      color: #111;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    p.sub {
      color: #555;
      font-size: 14px;
      margin-bottom: 32px;
      text-align: center;
    }

    .marker-wrapper {
      background: #fff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .targets-row {
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
    }
    .target-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .marker-label {
      font-size: 12px;
      letter-spacing: 3px;
      color: #888;
      text-transform: uppercase;
    }

    .hiro-container {
      width: 280px;
      height: 280px;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }

    .hiro-container img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .instructions {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px 20px;
      max-width: 320px;
      margin-top: 12px;
    }
    .instructions h3 {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 10px;
    }
    .instructions ol {
      padding-left: 16px;
      color: #555;
      font-size: 13px;
      line-height: 1.8;
    }

    .print-btn {
      margin-top: 20px;
      padding: 12px 28px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .print-btn:hover { background: #333; }

    @media print {
      body { background: #fff; }
      .print-btn, .instructions, h1, p.sub { display: none; }
      .marker-wrapper { box-shadow: none; }
    }
  </style>
</head>
<body>

  <h1>AR Target Images</h1>
  <p class="sub">Show either image to the camera to trigger its AR experience</p>

  <div class="marker-wrapper">
    <div class="targets-row">
      <div class="target-card">
        <div class="marker-label">A01-1399</div>
        <div class="hiro-container">
          <img
            src="Assets/A01-1399.jpg"
            width="280" height="280"
            alt="AR Target Image A01-1399"
            style="object-fit: cover; border-radius: 4px;"
          >
        </div>
      </div>

      <div class="target-card">
        <div class="marker-label">A01-1883</div>
        <div class="hiro-container">
          <img
            src="Assets/A01-1883.jpg"
            width="280" height="280"
            alt="AR Target Image A01-1883"
            style="object-fit: cover; border-radius: 4px;"
          >
        </div>
      </div>
    </div>

    <div class="instructions">
      <h3>How to use</h3>
      <ol>
        <li>Open the AR scanner app on your phone</li>
        <li>Allow camera access when prompted</li>
        <li>Point camera at either marker</li>
        <li>Hold steady — animation appears!</li>
      </ol>
    </div>

    <button class="print-btn" onclick="window.print()">Print Markers</button>
  </div>

</body>
</html>
