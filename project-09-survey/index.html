<!DOCTYPE html>
<html lang="ms" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Borang Maklum Balas — Kapsul Masa</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;
    font-family:"Century Gothic","Futura","Trebuchet MS","Segoe UI",sans-serif;}

  /* ═══════════════════════════════════════════════════════════
     SHARED BACKGROUND — brushed dark steel
  ═══════════════════════════════════════════════════════════ */
  .steel-bg{
    background:
      repeating-linear-gradient(87deg,transparent 0,transparent 3px,rgba(255,255,255,.018) 3px,rgba(255,255,255,.018) 4px),
      repeating-linear-gradient(0deg,transparent 0,transparent 18px,rgba(0,0,0,.06) 18px,rgba(0,0,0,.06) 19px),
      linear-gradient(160deg,#1c1c20 0%,#28282e 35%,#1a1a1e 65%,#222226 100%);}

  /* ═══════════════════════════════════════════════════════════
     GEAR CANVAS
  ═══════════════════════════════════════════════════════════ */
  #gearCanvas{
    position:fixed;inset:0;width:100%;height:100%;
    pointer-events:none;z-index:1;opacity:.18;}

  /* ═══════════════════════════════════════════════════════════
     METAL SHUTTERS (top + bottom)
  ═══════════════════════════════════════════════════════════ */
  .mstrip{
    position:fixed;left:0;right:0;z-index:60;
    pointer-events:none;overflow:hidden;}
  #mstrip-t{top:0;height:14vh;}
  #mstrip-b{bottom:0;height:14vh;}
  .mskin{
    width:100%;height:100%;
    display:flex;flex-direction:column;
    justify-content:space-evenly;padding:0 1vmin;
    position:relative;overflow:hidden;}
  #mstrip-t .mskin{
    background:linear-gradient(180deg,#a0c6d8 0%,#7ba6bc 55%,#628caa 100%);
    box-shadow:0 12px 50px rgba(0,0,0,.7);}
  #mstrip-b .mskin{
    background:linear-gradient(180deg,#628caa 0%,#7ba6bc 45%,#a0c6d8 100%);
    box-shadow:0 -12px 50px rgba(0,0,0,.7);}
  #mstrip-t::after{
    content:'';position:absolute;left:0;right:0;bottom:0;height:22px;z-index:2;
    background:
      radial-gradient(circle at center,#d4e8f2 0,#7aaac0 5px,#4a7a98 6.5px,transparent 7.5px) 0 0/34px 22px,
      linear-gradient(180deg,transparent 40%,rgba(0,0,0,.35));}
  #mstrip-b::before{
    content:'';position:absolute;left:0;right:0;top:0;height:22px;z-index:2;
    background:
      radial-gradient(circle at center,#d4e8f2 0,#7aaac0 5px,#4a7a98 6.5px,transparent 7.5px) 0 0/34px 22px,
      linear-gradient(180deg,rgba(0,0,0,.35),transparent 60%);}
  .mskin::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,
      transparent 0,rgba(255,255,255,.055) 1px,transparent 2px,transparent 6px);}
  .mskin::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.26) 0%,rgba(255,255,255,.05) 65%,transparent 100%);}
  .rvrow{display:flex;justify-content:space-around;width:100%;position:relative;z-index:1;}
  .rv{
    width:1.5vmin;height:1.5vmin;min-width:8px;min-height:8px;
    border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 32% 28%,#dcf0fa 0%,#86a8c2 50%,#4e6880 100%);
    box-shadow:0 .5px 2.5px rgba(0,0,0,.6),inset 0 .4px 0 rgba(255,255,255,.5);}

  /* ═══════════════════════════════════════════════════════════
     SCREENS
  ═══════════════════════════════════════════════════════════ */
  .screen{
    position:fixed;inset:0;z-index:10;
    display:none;flex-direction:column;
    overflow:hidden;}
  .screen.active{display:flex;}

  /* ═══════════════════════════════════════════════════════════
     SHARED HEADER
  ═══════════════════════════════════════════════════════════ */
  .pp-hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:1.8vh 3.5vw;gap:2vw;
    background:linear-gradient(180deg,#3a3a40 0%,#222226 40%,#1a1a1e 100%);
    border-bottom:3px solid #c9a227;
    box-shadow:0 4px 20px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12);
    flex-shrink:0;z-index:2;}
  .pp-hdr-l{display:flex;align-items:center;gap:1.8vw;}
  .pp-bnm-badge{
    width:7vmin;height:7vmin;min-width:40px;min-height:40px;
    border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%,#f0c040,#c9a227,#7a5c10);
    border:2px solid #e8b824;
    box-shadow:0 0 12px rgba(201,162,39,.5),inset 0 1px 0 rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;
    font-size:3vmin;color:#1a1000;font-weight:900;letter-spacing:-.05em;}
  .pp-bnm-txt{
    font-size:clamp(10px,1.6vmin,18px);color:#c8b870;
    letter-spacing:.1em;text-transform:uppercase;line-height:1.5;}
  .pp-hdr-r{
    font-size:clamp(9px,1.4vmin,16px);color:#888870;
    letter-spacing:.12em;text-transform:uppercase;text-align:right;line-height:1.7;}

  /* Gold rivet strip */
  .pp-rivet{
    height:1.4vh;min-height:10px;flex-shrink:0;
    background:linear-gradient(180deg,#c9a227 0%,#8a6a10 50%,#6a4e08 100%);
    display:flex;align-items:center;padding:0 .8vw;gap:.6vw;
    box-shadow:0 2px 8px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);z-index:2;}
  .pp-dot{
    width:1.6vmin;height:1.6vmin;min-width:7px;min-height:7px;
    border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 32% 28%,#ffe080,#c9a227,#7a5c10);
    box-shadow:0 1px 3px rgba(0,0,0,.6);}

  /* ═══════════════════════════════════════════════════════════
     LANDING SCREEN
  ═══════════════════════════════════════════════════════════ */
  #screen-landing{
    align-items:stretch;}

  .landing-body{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2.5vh;padding:4vh 5vw 18vh;
    position:relative;z-index:2;
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%,rgba(201,162,39,.06) 0%,transparent 70%),
      linear-gradient(135deg,#1e1e22 0%,#2a2a30 50%,#1a1a1e 100%);}

  /* Gear cluster decorations */
  .pp-gcluster{
    position:absolute;pointer-events:none;
    filter:invert(1) sepia(1) saturate(2) hue-rotate(170deg) opacity(.10);}
  .pp-gcl-l{left:-6%;top:5%;width:45vmin;transform:rotate(-15deg);}
  .pp-gcl-r{right:-6%;bottom:5%;width:45vmin;transform:rotate(20deg) scaleX(-1);}

  /* Event label */
  .land-event-label{
    font-size:clamp(9px,1.8vmin,20px);letter-spacing:.6em;
    color:#8a7840;font-weight:300;text-transform:uppercase;}

  /* Main title */
  .land-title{
    font-size:clamp(22px,5.5vmin,64px);font-weight:900;
    line-height:1.15;text-align:center;letter-spacing:.06em;
    color:#e8e0c0;
    text-shadow:
      0 0 40px rgba(201,162,39,.5),
      0 0 80px rgba(201,162,39,.2),
      0 3px 6px rgba(0,0,0,.9),
      2px 2px 0 rgba(0,0,0,.5);
    -webkit-text-stroke:.5px #c9a22740;}

  /* Museum name box */
  .land-museum{
    display:inline-block;
    border:2px solid #c9a227;padding:.6vh 2.5vw;
    font-size:clamp(9px,1.6vmin,18px);letter-spacing:.3em;
    color:#c9a227;text-transform:uppercase;
    background:rgba(201,162,39,.08);
    box-shadow:0 0 12px rgba(201,162,39,.2),inset 0 0 8px rgba(201,162,39,.05);
    text-align:center;}

  /* Divider line */
  .land-divider{
    width:min(60vw,400px);height:1px;
    background:linear-gradient(90deg,transparent,#c9a22760,transparent);}

  /* Borang Maklum Balas button */
  .btn-borang{
    position:relative;overflow:hidden;
    padding:1.6vh 5vw;
    font-family:"Century Gothic","Trebuchet MS","Segoe UI",sans-serif;
    font-size:clamp(14px,2.8vmin,34px);font-weight:700;
    letter-spacing:.2em;text-transform:uppercase;
    color:#1a1000;
    background:linear-gradient(135deg,#f0c040 0%,#c9a227 40%,#e8b824 60%,#f0c040 100%);
    border:none;border-radius:0;
    cursor:pointer;
    box-shadow:
      0 0 0 2px #c9a227,
      0 0 18px rgba(201,162,39,.5),
      0 0 40px rgba(201,162,39,.25),
      0 6px 20px rgba(0,0,0,.6);
    transition:box-shadow .3s,transform .15s;
    animation:btnShine 3s ease-in-out infinite;}

  .btn-borang::before{
    content:'';position:absolute;
    top:0;left:-75%;width:50%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-20deg);
    animation:shineSwipe 3s ease-in-out infinite;}

  @keyframes shineSwipe{
    0%,30%{left:-75%}
    60%,100%{left:125%}}

  @keyframes btnShine{
    0%,100%{
      box-shadow:0 0 0 2px #c9a227,0 0 18px rgba(201,162,39,.5),0 0 40px rgba(201,162,39,.25),0 6px 20px rgba(0,0,0,.6);}
    50%{
      box-shadow:0 0 0 2px #f0d060,0 0 30px rgba(240,192,64,.8),0 0 60px rgba(201,162,39,.5),0 6px 24px rgba(0,0,0,.7);}}

  .btn-borang:hover,.btn-borang:focus{
    transform:translateY(-2px);
    box-shadow:0 0 0 2px #f0d060,0 0 40px rgba(240,192,64,.9),0 0 80px rgba(201,162,39,.6),0 8px 28px rgba(0,0,0,.7);}
  .btn-borang:active{transform:translateY(1px);}

  /* Corner bolts on button */
  .btn-borang-wrap{position:relative;display:inline-block;}
  .bolt{
    position:absolute;width:1.6vmin;height:1.6vmin;min-width:7px;min-height:7px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#ffe080,#c9a227,#7a5c10);
    box-shadow:0 1px 3px rgba(0,0,0,.5);}
  .bolt-tl{top:-4px;left:-4px;}
  .bolt-tr{top:-4px;right:-4px;}
  .bolt-bl{bottom:-4px;left:-4px;}
  .bolt-br{bottom:-4px;right:-4px;}

  /* Touch hint */
  .land-hint{
    font-size:clamp(9px,1.8vmin,20px);letter-spacing:.4em;
    text-transform:uppercase;color:#c9a22770;
    animation:hintPulse 2.4s ease-in-out infinite;}
  @keyframes hintPulse{
    0%,100%{opacity:.4;transform:translateY(0)}
    50%{opacity:.9;transform:translateY(-3px)}}

  /* ═══════════════════════════════════════════════════════════
     SURVEY SCREEN
  ═══════════════════════════════════════════════════════════ */
  #screen-survey{
    background:#1a1a1e;}

  .survey-wrap{
    flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* iframe */
  #survey-frame{
    flex:1;width:100%;border:none;
    background:#fff;min-height:0;}

  /* Back button bar — sits below iframe, always visible */
  .back-bar{
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    padding:1.2vh 2vw;
    background:linear-gradient(180deg,#1a1a1e 0%,#222226 100%);
    border-top:2px solid #c9a22760;
    box-shadow:0 -4px 20px rgba(0,0,0,.5);}

  .back-btn{
    padding:.9vh 3.5vw;
    font-family:"Century Gothic","Trebuchet MS","Segoe UI",sans-serif;
    font-size:clamp(11px,2vmin,22px);font-weight:700;
    letter-spacing:.18em;text-transform:uppercase;
    color:#c9a227;
    background:rgba(26,26,30,.0);
    border:2px solid #c9a22780;
    cursor:pointer;
    box-shadow:0 0 12px rgba(201,162,39,.2),0 2px 10px rgba(0,0,0,.5);
    transition:all .2s;
    display:flex;align-items:center;gap:1vw;}
  .back-btn:hover,.back-btn:active{
    background:rgba(201,162,39,.12);
    border-color:#c9a227;
    box-shadow:0 0 22px rgba(201,162,39,.5),0 2px 14px rgba(0,0,0,.7);}
  .back-btn svg{flex-shrink:0;}

  /* ── Transitions ── */
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .screen.active{animation:fadeIn .4s ease forwards;}

</style>
</head>
<body>

<!-- ── Gear canvas background ── -->
<canvas id="gearCanvas"></canvas>

<!-- ── Metal shutters ── -->
<div class="mstrip" id="mstrip-t"><div class="mskin" id="rvt"></div></div>
<div class="mstrip" id="mstrip-b"><div class="mskin" id="rvb"></div></div>

<!-- ═══════════════════════════════════════════════════════════
     SCREEN 1: LANDING
═══════════════════════════════════════════════════════════ -->
<div class="screen steel-bg active" id="screen-landing">

  <!-- Header -->
  <div class="pp-hdr">
    <div class="pp-hdr-l">
      <div class="pp-bnm-badge">BNM</div>
      <div class="pp-bnm-txt">Muzium &amp; Galeri Seni<br>Bank Negara Malaysia</div>
    </div>
    <div class="pp-hdr-r">Kapsul Masa<br>2025 – 2026</div>
  </div>
  <div class="pp-rivet" id="rivet-top"></div>

  <!-- Body -->
  <div class="landing-body">

    <!-- Background gear clusters -->
    <img class="pp-gcluster pp-gcl-l" src="../project-08-intro/Assets/gears.png" alt="">
    <img class="pp-gcluster pp-gcl-r" src="../project-08-intro/Assets/gears.png" alt="">

    <!-- Texts -->
    <div class="land-event-label">Pameran Utama</div>

    <div class="land-title">Kapsul Masa<br>Kisah, Refleksi &amp; Kewangan</div>

    <div class="land-museum">Muzium dan Galeri Seni Bank Negara Malaysia</div>

    <div class="land-divider"></div>

    <!-- Shining button -->
    <div class="btn-borang-wrap">
      <div class="bolt bolt-tl"></div>
      <div class="bolt bolt-tr"></div>
      <div class="bolt bolt-bl"></div>
      <div class="bolt bolt-br"></div>
      <button class="btn-borang" id="btn-open-survey" onclick="openSurvey()">
        Borang Maklum Balas
      </button>
    </div>

    <div class="land-hint">Tekan untuk mengisi borang</div>

  </div>

  <!-- Bottom rivet strip -->
  <div class="pp-rivet" id="rivet-bot"></div>

</div><!-- /#screen-landing -->


<!-- ═══════════════════════════════════════════════════════════
     SCREEN 2: SURVEY
═══════════════════════════════════════════════════════════ -->
<div class="screen steel-bg" id="screen-survey">

  <!-- Header -->
  <div class="pp-hdr">
    <div class="pp-hdr-l">
      <div class="pp-bnm-badge">BNM</div>
      <div class="pp-bnm-txt">Muzium &amp; Galeri Seni<br>Bank Negara Malaysia</div>
    </div>
    <div class="pp-hdr-r">Borang Maklum Balas</div>
  </div>
  <div class="pp-rivet" id="rivet-survey"></div>

  <!-- Survey iframe + back bar -->
  <div class="survey-wrap">
    <iframe
      id="survey-frame"
      src="about:blank"
      title="Borang Maklum Balas"
      allow="camera;microphone"
    ></iframe>

    <div class="back-bar">
      <button class="back-btn" id="btn-back" onclick="closeSurvey()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Kembali ke Halaman Utama
      </button>
    </div>
  </div>

</div><!-- /#screen-survey -->


<script>
  const FORM_URL = 'https://forms.office.com/pages/responsepage.aspx?id=zQDHqiHHUUaY3beFRMlP1lps3gaghGZJnODRhRxNNL1UQ1JTSjg2R01YUDE1WVExVE5RQVRGUE9LNC4u&route=shorturl';

  // ── Screen switching ──────────────────────────────────────
  function openSurvey() {
    document.getElementById('survey-frame').src = FORM_URL;
    showScreen('screen-survey');
    document.getElementById('mstrip-b').style.display = 'none';
  }

  function closeSurvey() {
    showScreen('screen-landing');
    document.getElementById('mstrip-b').style.display = '';
    // Reset iframe after transition
    setTimeout(() => {
      document.getElementById('survey-frame').src = 'about:blank';
    }, 500);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Detect form completion via iframe URL change (best-effort)
  document.getElementById('survey-frame').addEventListener('load', function() {
    try {
      const url = this.contentWindow.location.href;
      if (url && url !== 'about:blank' && url.includes('thankYou')) {
        setTimeout(closeSurvey, 2500);
      }
    } catch(e) {
      // Cross-origin — can't read URL, that's fine
    }
  });

  // ── Build rivets ─────────────────────────────────────────
  function buildRivets(el, count) {
    const row = document.createElement('div');
    row.className = 'rvrow';
    for (let i = 0; i < count; i++) {
      const r = document.createElement('div');
      r.className = 'rv';
      row.appendChild(r);
    }
    el.appendChild(row);
  }

  const RV = Math.max(16, Math.round(window.innerWidth / 36));
  ['rvt','rvb'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { buildRivets(el, RV); buildRivets(el, RV); }
  });
  ['rivet-top','rivet-bot','rivet-survey'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      for (let i = 0; i < 28; i++) {
        const d = document.createElement('div');
        d.className = 'pp-dot';
        el.appendChild(d);
      }
    }
  });

  // ── Gear canvas animation ─────────────────────────────────
  (function() {
    const canvas = document.getElementById('gearCanvas');
    const ctx    = canvas.getContext('2d');

    // Load gear images from project-08 Assets
    const gearFiles = [
      '../project-08-intro/Assets/gear_01.png',
      '../project-08-intro/Assets/gear_02.png',
      '../project-08-intro/Assets/gear_03.png',
      '../project-08-intro/Assets/gear_04.png',
      '../project-08-intro/Assets/gear_05.png',
      '../project-08-intro/Assets/gear_06.png',
      '../project-08-intro/Assets/gear_07.png',
    ];
    const imgs = [];
    let loaded = 0;
    gearFiles.forEach((src, i) => {
      const img = new Image();
      img.onload = () => { loaded++; if (loaded === gearFiles.length) startAnim(); };
      img.onerror = () => { loaded++; if (loaded === gearFiles.length) startAnim(); };
      img.src = src;
      imgs[i] = img;
    });

    // Gear placement config
    const gears = [
      { img:0, x:.08, y:.18, r:.14, spd:.18 },
      { img:1, x:.88, y:.15, r:.11, spd:-.22 },
      { img:2, x:.15, y:.78, r:.12, spd:.20 },
      { img:3, x:.82, y:.82, r:.13, spd:-.16 },
      { img:4, x:.50, y:.10, r:.08, spd:.28 },
      { img:5, x:.05, y:.50, r:.09, spd:-.24 },
      { img:6, x:.92, y:.50, r:.09, spd:.22 },
    ];
    const angles = new Array(gears.length).fill(0);
    let last = 0;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function startAnim() {
      requestAnimationFrame(function loop(ts) {
        const dt = Math.min((ts - last) / 1000, 0.05);
        last = ts;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        gears.forEach((g, i) => {
          const img = imgs[g.img];
          if (!img || !img.complete || !img.naturalWidth) return;
          angles[i] += g.spd * dt;
          const cx = g.x * canvas.width;
          const cy = g.y * canvas.height;
          const sz = g.r * Math.min(canvas.width, canvas.height);
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angles[i]);
          ctx.drawImage(img, -sz, -sz, sz * 2, sz * 2);
          ctx.restore();
        });

        requestAnimationFrame(loop);
      });
    }

    // Fallback if images don't load (draw simple SVG-style gears)
    setTimeout(() => {
      if (loaded === 0) startAnim();
    }, 3000);
  })();
</script>
</body>
</html>
