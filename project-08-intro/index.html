<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kapsul Masa — Selamat Datang</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#ffffff;cursor:none}
  body{font-family:"Century Gothic","Futura","Trebuchet MS","Segoe UI",sans-serif;
       color:#eaf6ff}

  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:1;
      background:#ffffff;transition:opacity .4s ease}

  /* ── narrator text ── */
  #narr{
    position:fixed;inset:0;z-index:3;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1.3vmin;padding:6vmin;text-align:center;
    pointer-events:none;opacity:0;transition:opacity .9s ease}
  #narr.show{opacity:1}
  .nline{
    font-size:2.65vmin;font-weight:500;line-height:1.5;letter-spacing:.06em;
    color:#0a0e16;
    text-shadow:0 0 16px rgba(255,255,255,.65),0 0 4px rgba(255,255,255,.9);
    min-height:1.2em}
  .nline.first{font-size:3.7vmin;letter-spacing:.10em;font-weight:700;
    color:#000;text-shadow:0 0 18px rgba(255,255,255,.8),0 0 5px rgba(255,255,255,1);
    margin-bottom:.6vmin}
  .nline.accent{color:#101820;letter-spacing:.16em;text-transform:uppercase;
    font-size:2.4vmin}
  #cursor{display:inline-block;width:.5ch;color:#0a0e16;
    animation:blink 1s steps(2) infinite;text-shadow:0 0 8px rgba(255,255,255,.8)}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

  /* ── touch hint ── */
  #hint{
    position:fixed;left:50%;bottom:9vmin;transform:translateX(-50%);
    z-index:4;pointer-events:none;text-align:center;opacity:0;
    transition:opacity .8s ease}
  #hint.show{opacity:1;animation:hintPulse 2.4s ease-in-out infinite}
  #hint .ico{
    width:5vmin;height:5vmin;margin:0 auto 1.4vmin;border-radius:50%;
    border:1px solid rgba(0,0,0,.4);
    box-shadow:0 0 20px rgba(0,0,0,.12),inset 0 0 16px rgba(0,0,0,.06);
    display:flex;align-items:center;justify-content:center}
  #hint .ico::after{content:"";width:1.5vmin;height:1.5vmin;border-radius:50%;
    background:radial-gradient(circle,#333,#000);
    box-shadow:0 0 10px rgba(0,0,0,.35)}
  #hint .txt{font-size:2.1vmin;letter-spacing:.42em;text-transform:uppercase;
    color:#0a0e16;text-shadow:0 0 12px rgba(255,255,255,.6);
    padding-left:.42em}
  @keyframes hintPulse{0%,100%{opacity:.45;transform:translateX(-50%) translateY(0)}
    50%{opacity:1;transform:translateX(-50%) translateY(-1vmin)}}


  /* ── white flash / fade ── */
  #white{position:fixed;inset:0;z-index:9;background:#ffffff;opacity:0;
    pointer-events:none}

  /* ── fallback ── */
  #fallback{position:fixed;inset:0;z-index:20;display:none;
    align-items:center;justify-content:center;text-align:center;
    background:#02030a;color:#9fc7ff;font-size:3vmin;padding:8vmin;line-height:1.6}

  /* ── steampunk gear overlay ── */
  #gearSvg{position:fixed;inset:0;width:100%;height:100%;z-index:2;
    pointer-events:none;overflow:visible;
    animation:stIn 3s ease forwards;opacity:0;}
  .gg{transform-box:fill-box;transform-origin:center;}
  @keyframes stIn{0%{opacity:0}100%{opacity:1}}
  @keyframes gcw {from{transform:rotate(  0deg)}to{transform:rotate( 360deg)}}
  @keyframes gccw{from{transform:rotate(  0deg)}to{transform:rotate(-360deg)}}

  /* ── metal plating strips ── */
  .mstrip{position:fixed;left:0;right:0;z-index:5;pointer-events:none;overflow:hidden;
    animation:stIn 2s ease forwards .7s;opacity:0;}
  #mstrip-t{top:0;height:5vh;min-height:38px;}
  #mstrip-b{bottom:0;height:5vh;min-height:38px;}
  .mskin{width:100%;height:100%;display:flex;flex-direction:column;
    justify-content:space-evenly;padding:0 1vmin;
    position:relative;overflow:hidden;}
  #mstrip-t .mskin{
    background:linear-gradient(180deg,#a0c6d8 0%,#7ba6bc 55%,#628caa 100%);
    box-shadow:0 5px 20px rgba(0,0,0,.45);}
  #mstrip-b .mskin{
    background:linear-gradient(180deg,#628caa 0%,#7ba6bc 45%,#a0c6d8 100%);
    box-shadow:0 -5px 20px rgba(0,0,0,.45);}
  /* brushed-metal lines */
  .mskin::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,
      transparent 0,rgba(255,255,255,.055) 1px,transparent 2px,transparent 6px);}
  /* highlight sheen */
  .mskin::after{content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.26) 0%,rgba(255,255,255,.05) 65%,transparent 100%);}
  .rvrow{display:flex;justify-content:space-around;width:100%;
    position:relative;z-index:1;}
  .rv{width:1.5vmin;height:1.5vmin;min-width:8px;min-height:8px;
    border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 32% 28%,#dcf0fa 0%,#86a8c2 50%,#4e6880 100%);
    box-shadow:0 .5px 2.5px rgba(0,0,0,.6),inset 0 .4px 0 rgba(255,255,255,.5);}
</style>
</head>
<body>
  <canvas id="gl"></canvas>


  <div id="narr"></div>

  <div id="hint">
    <div class="ico"></div>
    <div class="txt" id="hint-txt">Sentuh Skrin</div>
  </div>

  <div id="white"></div>
  <div id="fallback">Peranti ini tidak menyokong WebGL.<br>This device does not support WebGL.</div>

  <!-- Steampunk gear overlay (z-index 2, behind narration text) -->
  <svg id="gearSvg" aria-hidden="true"></svg>
  <!-- Metal plating strips (z-index 5) -->
  <div class="mstrip" id="mstrip-t"><div class="mskin" id="rvt"></div></div>
  <div class="mstrip" id="mstrip-b"><div class="mskin" id="rvb"></div></div>

<script id="vert" type="x-shader/x-vertex">
attribute vec2 aPos;
void main(){ gl_Position = vec4(aPos,0.0,1.0); }
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;
//__DEFINES__
#ifndef OCT
#define OCT 3
#endif
#ifndef STEPS
#define STEPS 64
#endif

uniform vec2  uRes;
uniform float uTime;   // seconds
uniform float uSpin;   // 0..1 transition intensity
uniform float uBlob;   // 0..1 blob visibility
uniform float uHaloOn; // 0..1 middle-screen halo background
uniform float uHalo;   // halo ring speed multiplier
uniform float uHue;    // free-running global hue

// ── simplex noise (Ashima Arts, MIT) ──
vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x,289.0);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);
  const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);
  vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod(i,289.0);
  vec4 p=permute(permute(permute(
        i.z+vec4(0.0,i1.z,i2.z,1.0))
      + i.y+vec4(0.0,i1.y,i2.y,1.0))
      + i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=1.0/7.0;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;
  vec4 s1=floor(b1)*2.0+1.0;
  vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);
  m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm3(vec3 p){
  float a=0.5,f=0.0;
  for(int i=0;i<OCT;i++){ f+=a*snoise(p); p*=2.02; a*=0.5; }
  return f;
}
float hash21(vec2 p){
  p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y);
}
mat3 rotY(float a){float c=cos(a),s=sin(a);return mat3(c,0.,s, 0.,1.,0., -s,0.,c);}
mat3 rotX(float a){float c=cos(a),s=sin(a);return mat3(1.,0.,0., 0.,c,-s, 0.,s,c);}

// iridescent cosine palette
vec3 pal(float t){ return 0.5+0.5*cos(6.28318*(t+vec3(0.0,0.33,0.67))); }

// globals set per-pixel in main()
float gTime; float gDisp; float gRot;

float mapBlob(vec3 p){
  p = rotY(gRot)*rotX(gRot*0.6)*p;
  float base = length(p) - 0.46;                       // half radius (50% smaller)
  float n = fbm3(p*2.9 + vec3(0.0,0.0,gTime*0.30));     // doubled freq, slower evolution
  return base - n*gDisp;
}
vec3 calcNormal(vec3 p){
  vec2 e=vec2(0.0015,0.0);
  return normalize(vec3(
    mapBlob(p+e.xyy)-mapBlob(p-e.xyy),
    mapBlob(p+e.yxy)-mapBlob(p-e.yxy),
    mapBlob(p+e.yyx)-mapBlob(p-e.yyx)));
}

void main(){
  vec2 uv=(gl_FragCoord.xy - 0.5*uRes)/uRes.y;
  gTime=uTime;
  gDisp=0.15 + 0.055*sin(uTime*0.4) + uSpin*0.20;   // half amplitude (smaller blob)
  gRot =uTime*(0.10 + uSpin*9.0);                    // slower idle spin, same fast peak

  // ── mystic background (white with drifting pastel hue) ──
  vec2 q=uv*1.15;
  float warp=fbm3(vec3(q*1.4, uTime*0.05));
  float neb =fbm3(vec3(q*2.6 + warp*1.3, uTime*0.045));
  vec3 tintA=pal(uHue)*0.5+0.5;       // pastel
  vec3 tintB=pal(uHue+0.55)*0.5+0.5;
  vec3 tint=mix(tintA,tintB,neb);
  vec3 mystic=mix(vec3(1.0), tint, 0.12 + 0.12*smoothstep(-0.30,0.80,neb));
  mystic=mix(mystic, vec3(1.0), smoothstep(1.10,0.0,length(uv))*0.28); // bright center

  // ── halo rings background (middle screen) ──
  float r=length(uv);
  float ring=sin(r*24.0 - uTime*uHalo*3.0);
  ring=smoothstep(0.35,1.0,ring);
  vec3 haloTint=pal(uHue*0.4+0.12)*0.5+0.5;
  vec3 halo = vec3(1.0)*smoothstep(0.80,0.0,r);               // large bright core
  halo += haloTint*ring*0.30*smoothstep(1.30,0.10,r);          // faint tinted rings
  halo += vec3(1.0)*0.58;                                      // strong white wash
  halo = clamp(halo,0.0,1.6);

  vec3 bg=mix(mystic, halo, uHaloOn);

  // ── raymarch the blob ──
  vec3 ro=vec3(0.0,0.0,3.0);
  vec3 rd=normalize(vec3(uv,-1.7));
  float t=0.0; float hit=0.0; float glow=0.0; vec3 pos=ro;
  for(int i=0;i<STEPS;i++){
    pos=ro+rd*t;
    float d=mapBlob(pos);
    glow += 0.018/(0.02+d*d);          // soft volumetric bloom
    if(d<0.0015){ hit=1.0; break; }
    t+=d*0.85;
    if(t>6.0) break;
  }

  vec3 col=bg;
  float hue=uHue + uSpin*0.7 + uTime*0.04;
  vec3 glowCol=pal(hue+0.35);

  if(hit>0.5){
    vec3 nor=calcNormal(pos);
    vec3 ld=normalize(vec3(0.55,0.8,0.5));
    float dif=clamp(dot(nor,ld),0.0,1.0);
    float fres=pow(1.0-clamp(dot(nor,-rd),0.0,1.0),2.3);
    float h=hue + dot(nor,vec3(0.33))*0.4 + length(pos)*0.32;
    vec3 base=pal(h);
    vec3 blobCol=base*(0.32+0.68*dif) + fres*pal(h+0.3)*1.5;
    blobCol += pal(h+0.5)*0.45*pow(fres,0.6);          // inner sheen
    blobCol = mix(blobCol, vec3(1.7), uSpin*uSpin*0.75); // explode → white
    col = mix(bg, blobCol, uBlob);
  }
  // additive outer glow (also when ray misses surface)
  col += glowCol * glow * 0.5 * uBlob * (0.6+0.4*uSpin);

  // gentle film grain
  col += (hash21(uv*uRes.xy + uTime)-0.5)*0.025;

  col=pow(clamp(col,0.0,1.6), vec3(0.92)); // mild tone curve
  gl_FragColor=vec4(col,1.0);
}
</script>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('gl');
  // alpha:true → if the GPU drops the context (common on heavy iOS shaders),
  // the canvas becomes transparent and the white CSS background shows instead of black.
  const glOpts={antialias:false, alpha:true, premultipliedAlpha:false, powerPreference:'high-performance'};
  const gl = cv.getContext('webgl', glOpts) || cv.getContext('experimental-webgl', glOpts);
  if(!gl){ document.getElementById('fallback').style.display='flex'; return; }

  // mobile / iOS get a lighter shader so Safari doesn't kill the GPU process → black screen
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
                || (window.matchMedia && matchMedia('(pointer:coarse)').matches);
  const OCT = isMobile ? 2 : 3;
  const STEPS = isMobile ? 40 : 64;
  const RSCALE = isMobile ? 0.45 : 0.62;

  // if the context is lost, hide the canvas so the white page shows (black text stays readable)
  cv.addEventListener('webglcontextlost', e=>{ e.preventDefault(); cv.style.opacity='0'; }, false);

  // ── compile ──
  function sh(type, src){
    const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
    return s;
  }
  const fragSrc = document.getElementById('frag').textContent
    .replace('//__DEFINES__', `#define OCT ${OCT}\n#define STEPS ${STEPS}`);
  const prog=gl.createProgram();
  gl.attachShader(prog, sh(gl.VERTEX_SHADER,   document.getElementById('vert').textContent));
  gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){
    document.getElementById('fallback').style.display='flex'; return;
  }
  gl.useProgram(prog);

  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
  const aPos=gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

  const L={ res:gl.getUniformLocation(prog,'uRes'), time:gl.getUniformLocation(prog,'uTime'),
            spin:gl.getUniformLocation(prog,'uSpin'), blob:gl.getUniformLocation(prog,'uBlob'),
            haloOn:gl.getUniformLocation(prog,'uHaloOn'), halo:gl.getUniformLocation(prog,'uHalo'),
            hue:gl.getUniformLocation(prog,'uHue') };

  // render at reduced backing res — bloom/softness hides it, big perf win (RSCALE set above)
  function resize(){
    const w=Math.max(2,Math.floor(innerWidth*RSCALE));
    const h=Math.max(2,Math.floor(innerHeight*RSCALE));
    if(cv.width!==w||cv.height!==h){ cv.width=w; cv.height=h; gl.viewport(0,0,w,h); }
  }
  addEventListener('resize',resize); resize();

  // ── animation state ──
  const U={ time:0, spin:0, blob:1, haloOn:0, halo:1, hue:0 };
  const tweens=[];
  const easeInCubic=t=>t*t*t;
  const easeInQuart=t=>t*t*t*t;
  const easeOutCubic=t=>1-Math.pow(1-t,3);
  const easeInQuad=t=>t*t;
  function tween(key,to,dur,ease){
    // kill existing tween on same key
    for(let i=tweens.length-1;i>=0;i--) if(tweens[i].key===key) tweens.splice(i,1);
    tweens.push({key,from:U[key],to,dur,start:performance.now(),ease:ease||(t=>t)});
  }
  function updateTweens(now){
    for(let i=tweens.length-1;i>=0;i--){
      const tw=tweens[i]; let p=(now-tw.start)/tw.dur;
      if(p>=1){ p=1; tweens.splice(i,1); }
      U[tw.key]=tw.from+(tw.to-tw.from)*tw.ease(Math.max(0,p));
    }
  }

  let last=performance.now();
  function frame(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    U.time+=dt;
    U.hue +=dt*0.03;            // free-running color drift
    updateTweens(now);
    resize();
    gl.uniform2f(L.res, cv.width, cv.height);
    gl.uniform1f(L.time, U.time);
    gl.uniform1f(L.spin, U.spin);
    gl.uniform1f(L.blob, U.blob);
    gl.uniform1f(L.haloOn, U.haloOn);
    gl.uniform1f(L.halo, U.halo);
    gl.uniform1f(L.hue, U.hue);
    gl.drawArrays(gl.TRIANGLES,0,3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ══════════════════════════════════════════════
  //  AUDIO (synthesized, no assets — graceful)
  // ══════════════════════════════════════════════
  let AC=null, drone=null, droneGain=null;
  function ensureAudio(){
    if(AC) { if(AC.state==='suspended') AC.resume(); return; }
    try{
      AC=new (window.AudioContext||window.webkitAudioContext)();
      droneGain=AC.createGain(); droneGain.gain.value=0.0; droneGain.connect(AC.destination);
      const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600; lp.connect(droneGain);
      [55,82.5,110].forEach((f,i)=>{
        const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f*(1+i*0.003);
        const g=AC.createGain(); g.gain.value=0.5/(i+1); o.connect(g); g.connect(lp); o.start();
        // slow shimmer LFO
        const lfo=AC.createOscillator(); lfo.frequency.value=0.05+i*0.02;
        const lg=AC.createGain(); lg.gain.value=0.15; lfo.connect(lg); lg.connect(g.gain); lfo.start();
      });
      drone=lp;
      ramp(droneGain.gain,0.18,3.0);
    }catch(e){ AC=null; }
  }
  function ramp(param,to,sec){
    if(!AC) return;
    param.cancelScheduledValues(AC.currentTime);
    param.setValueAtTime(param.value,AC.currentTime);
    param.linearRampToValueAtTime(to,AC.currentTime+sec);
  }
  function whoosh(rise){
    if(!AC) return;
    const t0=AC.currentTime;
    // noise burst
    const len=AC.sampleRate*1.4;
    const b=AC.createBuffer(1,len,AC.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.5);
    const src=AC.createBufferSource(); src.buffer=b;
    const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.2;
    bp.frequency.setValueAtTime(300,t0); bp.frequency.exponentialRampToValueAtTime(3500,t0+1.2);
    const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t0);
    g.gain.linearRampToValueAtTime(0.3,t0+0.2); g.gain.exponentialRampToValueAtTime(0.001,t0+1.4);
    src.connect(bp); bp.connect(g); g.connect(AC.destination); src.start(t0); src.stop(t0+1.5);
    // rising tone
    const o=AC.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(rise?120:220,t0);
    o.frequency.exponentialRampToValueAtTime(rise?900:60,t0+1.3);
    const og=AC.createGain(); og.gain.setValueAtTime(0.0001,t0);
    og.gain.linearRampToValueAtTime(0.12,t0+0.3); og.gain.exponentialRampToValueAtTime(0.001,t0+1.4);
    const of=AC.createBiquadFilter(); of.type='lowpass'; of.frequency.value=1800;
    o.connect(of); of.connect(og); og.connect(AC.destination); o.start(t0); o.stop(t0+1.5);
  }
  function tick(){
    if(!AC) return;
    const t0=AC.currentTime;
    const o=AC.createOscillator(); o.type='sine'; o.frequency.value=900+Math.random()*400;
    const g=AC.createGain(); g.gain.setValueAtTime(0.04,t0); g.gain.exponentialRampToValueAtTime(0.0008,t0+0.08);
    o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+0.1);
  }

  // ── enter BGM (post-narration transition) ──
  const bgm=new Audio('Assets/enter_bgm.mp3');
  bgm.preload='auto';
  let bgmFade=null;
  function playBgm(){
    if(bgmFade){ clearInterval(bgmFade); bgmFade=null; }
    try{ bgm.currentTime=0; }catch(e){}
    bgm.volume=1; bgm.play().catch(()=>{});
  }
  function fadeBgmOut(dur){
    if(bgmFade) clearInterval(bgmFade);
    const step=50, dec=bgm.volume/(dur/step);
    bgmFade=setInterval(()=>{
      bgm.volume=Math.max(0,bgm.volume-dec);
      if(bgm.volume<=0){ clearInterval(bgmFade); bgmFade=null; bgm.pause(); }
    }, step);
  }
  function stopBgm(){
    if(bgmFade){ clearInterval(bgmFade); bgmFade=null; }
    bgm.pause(); try{ bgm.currentTime=0; }catch(e){}
  }

  // ══════════════════════════════════════════════
  //  WHITE FADE
  // ══════════════════════════════════════════════
  const wf=document.getElementById('white');
  function fadeWhite(to,dur){
    wf.style.transition=`opacity ${dur}ms ${to>0.5?'ease-in':'ease-out'}`;
    requestAnimationFrame(()=>{ wf.style.opacity=to; });
  }

  // ══════════════════════════════════════════════
  //  NARRATION
  // ══════════════════════════════════════════════
  const narr=document.getElementById('narr');
  let lang='bm';
  const HINTS={bm:'SENTUH SKRIN UNTUK MEMBUKA PORTAL MASA', en:'TOUCH SCREEN TO OPEN THE PORTAL OF TIME'};
  const LINES=[
    {c:"first", bm:"Selamat datang, Pengembara Masa.",            en:"Welcome, Time Traveller."},
    {bm:"Ini adalah sebuah Kapsul Masa: Kisah, Refleksi dan Kewangan",
     en:"This is a Time Capsule: Stories, Reflections and Finance"},
    {bm:"oleh Muzium dan Galeri Seni Bank Negara Malaysia",
     en:"by the Bank Negara Malaysia Museum and Art Gallery"},
    {bm:"yang menyimpan kisah perjalanan",                   en:"that holds the story of a journey"},
    {bm:"bagaimana kewangan dan budaya berkembang seiring", en:"of how finance and culture evolved together"},
    {bm:"dalam membentuk sebuah negara yang bersatu.",       en:"in shaping a united nation."},
    {c:"accent", bm:"Aktifkan kapsul masa..",                en:"Activate the time capsule.."},
    {bm:"kembali ke Masa Lalu,",                             en:"back to the Past,"},
    {bm:"Masa Kini",                                          en:"the Present"},
    {bm:"dan Masa Hadapan",                                   en:"and the Future"},
    {bm:"Pengembaraan masa anda bermula sekarang.",  en:"Your journey through time begins now."}
  ];
  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  function charDelay(ch){
    if(ch==='.'||ch===',') return 150;
    if(ch===' ') return 14;
    return 20;
  }
  let narrToken=0;
  async function startNarration(){
    const mine=++narrToken;
    narr.innerHTML=''; narr.classList.add('show');
    const gap=Math.floor(3000/LINES.length);   // all lines within 3 s
    const els=LINES.map(l=>{
      const d=document.createElement('div');
      d.className='nline'+(l.c?' '+l.c:'');
      d.textContent=l[lang];
      d.style.cssText='opacity:0;transform:translateY(8px);transition:opacity .28s ease,transform .28s ease';
      narr.appendChild(d); return d;
    });
    for(let i=0;i<els.length;i++){
      if(mine!==narrToken) return;
      tick();
      els[i].style.opacity='1'; els[i].style.transform='translateY(0)';
      await sleep(gap);
    }
    if(mine!==narrToken) return;
    await sleep(200);
    if(mine!==narrToken) return;
    narrationDone();
  }

  // ══════════════════════════════════════════════
  //  HINT
  // ══════════════════════════════════════════════
  const hint=document.getElementById('hint');
  const hintTxt=document.getElementById('hint-txt');
  function updateHint(){ hintTxt.textContent=HINTS[lang]; }
  function showHint(){ updateHint(); hint.classList.add('show'); }
  function hideHint(){ hint.classList.remove('show'); }


  // ══════════════════════════════════════════════
  //  STATE MACHINE
  // ══════════════════════════════════════════════
  let state='START', locked=false;
  const timers=[];
  function later(fn,ms){ timers.push(setTimeout(fn,ms)); }
  function clearTimers(){ timers.forEach(clearTimeout); timers.length=0; }

  function toStart(){
    state='START'; locked=false;
    narrToken++; narr.classList.remove('show'); narr.innerHTML='';
    U.haloOn=0; U.blob=1; U.spin=0; U.halo=1;
    showHint();
  }

  function transitionIn(){
    state='TRANS_IN'; locked=true; hideHint(); whoosh(true);
    tween('spin',1,2800,easeInQuart);   // longer buildup: slow start → fast spin
    later(()=>fadeWhite(1,700), 2150);
    later(()=>{                       // white fully covers ~2850ms
      // reconfigure for middle screen under cover of white
      U.haloOn=1; U.blob=0; U.spin=0; U.halo=1;
      state='MIDDLE';
      fadeWhite(0,850);
      ramp(droneGain&&droneGain.gain,0.12,2.0);
      startNarration();
    }, 2850);
  }

  function narrationDone(){
    state='MIDDLE_WAIT';
    tween('blob',1,1300,easeOutCubic);   // blob re-materialises over halo
    later(()=>{ showHint(); locked=false; }, 700);
  }

  function transitionOut(){
    state='TRANS_OUT'; locked=true; hideHint(); whoosh(true);
    narrToken++; narr.classList.remove('show');
    playBgm();                              // enter BGM for the blob transition
    ramp(droneGain&&droneGain.gain,0.0,0.5); // duck synth drone under BGM
    tween('spin',1,2600,easeInQuart);    // longer buildup: slow start → fast spin
    tween('halo',7,5000,easeInQuad);     // rings accelerate over 5s
    later(()=>{ fadeWhite(1,800); fadeBgmOut(2800); }, 5000); // after 5s, fade to white + BGM
    later(()=>{                          // 3s after fade-to-white begins
      stopBgm();
      toStart();
      fadeWhite(0,950);
      ramp(droneGain&&droneGain.gain,0.18,2.0);
    }, 8000);
  }

  // ── input ──
  function onTap(){
    ensureAudio();
    if(locked) return;
    if(state==='START'){ transitionIn(); }
    else if(state==='MIDDLE_WAIT'){ transitionOut(); }
  }
  addEventListener('pointerdown', onTap);

  // ── kiosk hardening ──
  function goFull(){
    if(document.fullscreenElement) return;
    const el=document.documentElement;
    const fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(fn){ const p=fn.call(el); if(p&&p.catch) p.catch(()=>{}); }
  }
  // best-effort immediate (works when launched with a fullscreen-capable context);
  // browsers without a gesture will ignore it — gesture fallback below covers that.
  goFull();
  addEventListener('load', goFull, {once:true});
  ['pointerdown','touchstart','keydown'].forEach(ev=>
    addEventListener(ev, goFull, {once:true}));
  addEventListener('contextmenu', e=>e.preventDefault());
  addEventListener('touchstart', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
  addEventListener('gesturestart', e=>e.preventDefault());

  // boot
  toStart();
})();
</script>

<script>
/* ── Steampunk gears + metal-strip rivets ── */
(function(){
  var S=document.getElementById('gearSvg');
  var RT=document.getElementById('rvt'), RB=document.getElementById('rvb');

  function gp(cx,cy,ro,ri,rh,n){
    var step=Math.PI*2/n, tw=step*.46, bv=step*.09, d='';
    for(var i=0;i<n;i++){
      var a=i*step;
      var P=function(r,ang){return (cx+Math.cos(ang)*r).toFixed(1)+' '+(cy+Math.sin(ang)*r).toFixed(1);};
      if(i===0) d+='M '+P(ri,a-tw-bv)+' ';
      d+='L '+P(ro,a-tw)+' L '+P(ro,a+tw)+' L '+P(ri,a+tw+bv)+' ';
    }
    d+='Z M '+(cx+rh).toFixed(1)+' '+cy+' A '+rh+' '+rh+' 0 1 0 '+(cx-rh).toFixed(1)+' '+cy+' A '+rh+' '+rh+' 0 1 0 '+(cx+rh).toFixed(1)+' '+cy+' Z';
    return d;
  }

  function spokes(cx,cy,ri,rhub,n){
    var s='';
    for(var i=0;i<n;i++){
      var a=i*Math.PI*2/n;
      var sw=(ri*.085).toFixed(1);
      s+='<line x1="'+(cx+Math.cos(a)*rhub*1.4).toFixed(1)+'" y1="'+(cy+Math.sin(a)*rhub*1.4).toFixed(1)+'"'
        +' x2="'+(cx+Math.cos(a)*ri*.77).toFixed(1)+'" y2="'+(cy+Math.sin(a)*ri*.77).toFixed(1)+'"'
        +' stroke="rgba(0,0,0,.28)" stroke-width="'+sw+'" stroke-linecap="round"/>';
    }
    return s;
  }

  function gear(cx,cy,ro,ri,rhub,rhole,n,gr,anim,dur,op){
    op=op===undefined?.88:op;
    var d=gp(cx,cy,ro,ri,rhole,n);
    var ns=Math.max(3,Math.min(6,Math.round(n/5)));
    return '<g class="gg" style="animation:'+anim+' '+dur+'s linear infinite" opacity="'+op+'">'
      +'<path d="'+d+'" fill="url(#'+gr+')" fill-rule="evenodd" stroke="rgba(0,0,0,.12)" stroke-width=".5"/>'
      +'<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+rhub.toFixed(1)+'" fill="url(#'+gr+')" />'
      +spokes(cx,cy,ri,rhub,ns)
      +'<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+rhole.toFixed(1)+'" fill="#0c0c18"/>'
      +'<path d="'+d+'" fill="url(#gSheen)" fill-rule="evenodd" opacity=".4"/>'
      +'<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="'+rhub.toFixed(1)+'" fill="url(#gSheen)" opacity=".22"/>'
      +'</g>';
  }

  function build(){
    var W=innerWidth, H=innerHeight, vm=Math.min(W,H);

    var defs='<defs>'
      +'<radialGradient id="gGold" cx="38%" cy="32%" r="68%">'
      +'<stop offset="0%"   stop-color="#FFF6B0"/>'
      +'<stop offset="18%"  stop-color="#F0D040"/>'
      +'<stop offset="55%"  stop-color="#C89A10"/>'
      +'<stop offset="100%" stop-color="#7C5C08"/>'
      +'</radialGradient>'
      +'<radialGradient id="gSilv" cx="38%" cy="32%" r="68%">'
      +'<stop offset="0%"   stop-color="#EEF8FF"/>'
      +'<stop offset="22%"  stop-color="#C6DAEC"/>'
      +'<stop offset="60%"  stop-color="#8AAEC2"/>'
      +'<stop offset="100%" stop-color="#4A6878"/>'
      +'</radialGradient>'
      +'<linearGradient id="gSheen" x1="0" y1="0" x2="1" y2="1">'
      +'<stop offset="0%"   stop-color="rgba(255,255,255,.55)"/>'
      +'<stop offset="45%"  stop-color="rgba(255,255,255,.05)"/>'
      +'<stop offset="100%" stop-color="rgba(0,0,0,.08)"/>'
      +'</linearGradient>'
      +'</defs>';

    /* ── gear layout ── */
    // Bottom-left: large gold + meshing silver
    var BLX=-vm*.04, BLY=H+vm*.06;
    var ro1=vm*.30, ri1=vm*.25;
    var ro2=vm*.18, ri2=vm*.15;
    var ang12=.26*Math.PI; // direction to second gear from first
    var cx2=BLX+(ro1+ro2-.01*vm)*Math.cos(ang12);
    var cy2=BLY-(ro1+ro2-.01*vm)*Math.sin(ang12);

    // Bottom-right: medium gold + meshing silver
    var BRX=W+vm*.07, BRY=H+vm*.07;
    var ro3=vm*.23, ri3=vm*.19;
    var ro4=vm*.12, ri4=vm*.10;
    var ang34=.74*Math.PI;
    var cx4=BRX+(ro3+ro4-.01*vm)*Math.cos(ang34);
    var cy4=BRY-(ro3+ro4-.01*vm)*Math.sin(ang34);

    // Top-right accent + top-left tiny
    var TRX=W+vm*.04, TRY=-vm*.03;
    var TLX=-vm*.05, TLY=-vm*.02;

    var h=defs;
    h+=gear(BLX, BLY, ro1,  ri1,  ri1*.30, ri1*.11, 24,'gGold','gcw', 50,.88);
    h+=gear(cx2, cy2, ro2,  ri2,  ri2*.30, ri2*.11, 16,'gSilv','gccw',34,.82);
    h+=gear(BRX, BRY, ro3,  ri3,  ri3*.30, ri3*.11, 20,'gGold','gccw',44,.86);
    h+=gear(cx4, cy4, ro4,  ri4,  ri4*.30, ri4*.11, 12,'gSilv','gcw', 27,.78);
    h+=gear(TRX, TRY, vm*.14,vm*.12,vm*.04,vm*.015, 14,'gSilv','gcw', 40,.70);
    h+=gear(TLX, TLY, vm*.09,vm*.07,vm*.028,vm*.011,10,'gGold','gccw',29,.65);

    S.innerHTML=h;

    /* ── rivets ── */
    var nc=Math.round(W/17);
    var row='<div class="rvrow">';
    for(var i=0;i<nc;i++) row+='<span class="rv"></span>';
    row+='</div>';
    RT.innerHTML=row+row;
    RB.innerHTML=row+row;
  }

  build();
  window.addEventListener('resize', build);
})();
</script>
